name: CricHD Auto Update

on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Pizza repository
      uses: actions/checkout@v4
      with:
        repository: buzzinguaecn/Pizza
        token: ${{ secrets.PAT }}
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Generate M3U Playlist
      env:
        CRICHD_PAGE_URL: ${{ secrets.CRICHD_PAGE }}
        CRICHD_URL: ${{ secrets.CRICHD }}
      run: |
        python -c "
        import urllib.request
        import re
        import os

        # অনুমতিপ্রাপ্ত চ্যানেলের তালিকা
        allowed_channels = {
            'Star Sports 1',
            'Star Sports 1 Hindi',
            'PTV Sports',
            'Willow HD',
            'Willow HD 2',
            'Ten Sports',
            'A Sports HD',
            'Sky Sports Cricket',
            'Sky Cinema',
            'TNT 1',
            'TNT 2',
            'TNT 3',
            'TNT 4',
            'Sky Sport Nz 1',
            'Sky Sport Nz 2',
            'Sky Sport Nz 3',
            'Sky Sport Nz 4',
            'Sky Sport Nz 5',
            'Sky Sport 6 Nz',
            'Sky Sport Nz 7',
            'Sky Sport Nz 8',
            'Sky Sport Nz 9',
            'Sky Sports Action',
            'Sky Sports Golf',
            'Sky Sports Premier League',
            'Sky Sports Football',
            'Sky Sports Arena',
            'Sky Sports F1',
            'LaLiGA',
            'Premier Sports 1',
            'Premier Sports 2',
            'Super Football',
            'Super Premier League',
            'Fox Cricket 501 HD',
            'ESPN 1',
            'ESPN 2',
            'Sky Sports Mix',
            'Sky Sports Tennis',
            'Sony Sports3'
        }

        def parse_m3u(content):
            lines = content.splitlines()
            channels = []
            current_channel = None
            
            for line in lines:
                line = line.strip()
                if not line:
                    continue
                if line.startswith('#EXTINF:'):
                    if current_channel:
                        channels.append(current_channel)
                    # কমার পরের অংশ থেকে চ্যানেলের নাম নেওয়া হচ্ছে
                    name_match = re.search(r',\s*(.*)$', line)
                    ch_name = name_match.group(1).strip() if name_match else ''
                    current_channel = {'inf': line, 'name': ch_name, 'details': []}
                elif current_channel:
                    current_channel['details'].append(line)
            
            if current_channel:
                channels.append(current_channel)
            return channels

        # ডাটা ফেচ করা
        try:
            req_page = urllib.request.Request(os.environ['CRICHD_PAGE_URL'], headers={'User-Agent': 'Mozilla/5.0'})
            req_source = urllib.request.Request(os.environ['CRICHD_URL'], headers={'User-Agent': 'Mozilla/5.0'})
            
            page_data = urllib.request.urlopen(req_page).read().decode('utf-8')
            source_data = urllib.request.urlopen(req_source).read().decode('utf-8')
        except Exception as e:
            print(f'Error fetching data: {e}')
            exit(1)

        page_channels = parse_m3u(page_data)
        source_channels = parse_m3u(source_data)

        # দ্রুত খোঁজার জন্য সোর্স চ্যানেলগুলোকে ডিকশনারিতে রাখা হলো
        source_dict = {}
        for ch in source_channels:
            if ch['name']:
                source_dict[ch['name'].lower()] = ch

        output_blocks = []

        # ম্যাচিং প্রক্রিয়া
        for ch in page_channels:
            name = ch['name']
            name_lower = name.lower()
            
            # চ্যানেলের নাম যদি এলাউড লিস্টে থাকে
            if any(allowed.lower() == name_lower for allowed in allowed_channels):
                if name_lower in source_dict:
                    src_ch = source_dict[name_lower]
                    
                    # ব্লক তৈরি করা হচ্ছে (CRICHD_PAGE এর EXTINF এবং CRICHD এর লিংক ও অপশন সমূহ)
                    block = [ch['inf']]
                    for detail in src_ch['details']:
                        block.append(detail)
                    
                    output_blocks.append('\n'.join(block))

        # প্লেলিস্টের মূল হেডার এবং ২টি খালি লাইনের ব্যবধান রেখে ফাইল রাইট করা
        final_content = '#EXTM3U\n\n\n' + '\n\n\n'.join(output_blocks)

        with open('CRICHD.m3u', 'w', encoding='utf-8') as f:
            f.write(final_content)
        print('Playlist generated successfully.')
        "

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add CRICHD.m3u
        # ফাইলটিতে কোনো পরিবর্তন আসলেই কেবল কমিট হবে
        git diff-index --quiet HEAD || git commit -m 'Auto-updated CRICHD.m3u [Skip CI]'
        git push origin main
