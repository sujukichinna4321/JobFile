name: CricHD
on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর স্বয়ংক্রিয়ভাবে চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  update-crichd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Process and Update CricHD Playlist
        env:
          CRICHD_PAGE: ${{ secrets.CRICHD_PAGE }}
          CRICHD: ${{ secrets.CRICHD }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cat << 'EOF' > update_crichd.py
          import os
          import requests
          from datetime import datetime, timedelta, timezone

          # সিক্রেট ভ্যারিয়েবল থেকে সোর্স লিঙ্ক সংগ্রহ
          page_url = os.getenv("CRICHD_PAGE")
          source_url = os.getenv("CRICHD")
          pat_token = os.getenv("PAT_TOKEN")

          if not page_url or not source_url:
              print("Error: CRICHD_PAGE or CRICHD secrets are not set.")
              exit(1)

          # ১. CRICHD_PAGE (চ্যানেল টেমপ্লেট) ডাউনলোড করা
          try:
              r_page = requests.get(page_url, timeout=20)
              if r_page.status_code != 200:
                  print("Error: Failed to fetch CRICHD_PAGE")
                  exit(1)
              page_content = r_page.text
          except Exception as e:
              print(f"Error fetching CRICHD_PAGE: {e}")
              exit(1)

          # ২. CRICHD (মূল স্ট্রিমিং সোর্স) ডাউনলোড করা
          try:
              r_source = requests.get(source_url, timeout=20)
              if r_source.status_code != 200:
                  print("Error: Failed to fetch CRICHD source")
                  exit(1)
              source_content = r_source.text
          except Exception as e:
              print(f"Error fetching CRICHD source: {e}")
              exit(1)

          # ডেস্টিনেশন রিপোজিটরি ক্লোন করা
          os.system(f"git clone https://x-access-token:{pat_token}@github.com/buzzinguaecn/Pizza.git pizza-repo")

          # ৩. CRICHD (সোর্স) থেকে চ্যানেল ডাটা পার্স করা
          crichd_data = {}
          current_name = None
          current_vlcopts = []

          for line in source_content.splitlines():
              line_str = line.strip()
              if not line_str or line_str.startswith("#EXTM3U"):
                  continue
              
              if line_str.startswith("#EXTINF:"):
                  comma_idx = line_str.rfind(',')
                  if comma_idx != -1:
                      current_name = line_str[comma_idx+1:].strip().lower()
                  else:
                      current_name = None
                  current_vlcopts = []
              elif line_str.startswith("#EXTVLCOPT:"):
                  current_vlcopts.append(line_str)
              elif line_str.startswith("http://") or line_str.startswith("https://"):
                  if current_name:
                      crichd_data[current_name] = {
                          "vlcopts": current_vlcopts,
                          "url": line_str
                      }
                      current_name = None
                      current_vlcopts = []

          # ৪. CRICHD_PAGE (টেমপ্লেট) অনুযায়ী ম্যাপিং করা
          blocks = []
          for line in page_content.splitlines():
              line_str = line.strip()
              if not line_str or line_str.startswith("#EXTM3U"):
                  continue
              
              if line_str.startswith("#EXTINF:"):
                  comma_idx = line_str.rfind(',')
                  if comma_idx != -1:
                      page_chan_name = line_str[comma_idx+1:].strip()
                      page_key = page_chan_name.lower()
                      
                      # যদি সোর্স ফাইলে এই চ্যানেল নামটি খুঁজে পাওয়া যায়
                      if page_key in crichd_data:
                          match = crichd_data[page_key]
                          block_lines = [line_str] # মূল টেমপ্লেট #EXTINF লাইন
                          if match["vlcopts"]:
                              block_lines.extend(match["vlcopts"]) # VLCOPT যুক্ত করা
                          block_lines.append(match["url"]) # স্ট্রিমিং ইউআরএল যুক্ত করা
                          
                          blocks.append("\n".join(block_lines))

          # বাংলাদেশ সময় নির্ধারণ (BST / UTC+6)
          bst_time = (datetime.now(timezone.utc) + timedelta(hours=6)).strftime('%Y-%m-%d %H:%M:%S')

          # ২ লাইনের গ্যাপ তৈরি করতে "\n\n\n" ব্যবহার করা হলো
          blocks_content = "\n\n\n".join(blocks)
          final_content = f"#EXTM3U\n# Last Updated: {bst_time} (BST)\n\n\n{blocks_content}\n"

          # ফাইলটি pizza-repo-তে সেভ করা (আগের ডাটা সম্পূর্ণ মুছে যাবে)
          output_path = "pizza-repo/CRICHD.m3u"
          with open(output_path, "w", encoding="utf-8") as f:
              f.write(final_content)
          EOF
          python update_crichd.py

      - name: Commit and Push Changes
        run: |
          cd pizza-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ফাইলটি স্টেজিং এরিয়ায় যুক্ত করা হলো
          git add CRICHD.m3u
          
          # পরিবর্তনের ডিস্ট্রিবিউশন চেক এবং পুশ
          if git diff --staged --quiet; then
            echo "No changes found. Commit skipped."
          else
            CURRENT_TIME=$(date -u -d "+6 hours" +"%Y-%m-%d %H:%M:%S")
            
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              COMMIT_MESSAGE="🆗 CricHD : Manual Trigger Done ✅ - $CURRENT_TIME 🟡"
            else
              COMMIT_MESSAGE="🆗 CricHD : Scheduled Auto Update Done ✅ - $CURRENT_TIME 🟡"
            fi
            
            git commit -m "$COMMIT_MESSAGE"
            git push origin main
          fi
