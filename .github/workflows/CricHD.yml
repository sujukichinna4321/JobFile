name: CricHD
on:
  schedule:
    - cron: '*/20 * * * *' # Runs automatically every 20 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  update-crichd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Process and Update CricHD Playlist
        env:
          CRICHD_PAGE: ${{ secrets.CRICHD_PAGE }}
          CRICHD: ${{ secrets.CRICHD }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cat << 'EOF' > update_crichd.py
          import os
          import requests
          from datetime import datetime, timedelta, timezone

          # Fetch source URLs and token from environment variables
          page_url = os.getenv("CRICHD_PAGE")
          source_url = os.getenv("CRICHD")
          pat_token = os.getenv("PAT_TOKEN")

          if not page_url or not source_url:
              print("Error: CRICHD_PAGE or CRICHD secrets are not set.")
              exit(1)

          # Allowed channel names list (Normalized to lowercase)
          ALLOWED_CHANNELS = {
              "star sports 1",
              "star sports 1 hindi",
              "ptv sports",
              "willow hd",
              "willow hd 2",
              "ten sports",
              "a sports hd",
              "sky sports cricket",
              "sky cinema",
              "tnt 1",
              "tnt 2",
              "tnt 3",
              "tnt 4",
              "sky sport nz 1",
              "sky sport nz 2",
              "sky sport nz 3",
              "sky sport nz 4",
              "sky sport nz 5",
              "sky sport 6 nz",
              "sky sport nz 7",
              "sky sport nz 8",
              "sky sport nz 9",
              "sky sports action",
              "sky sports golf",
              "sky sports premier league",
              "sky sports football",
              "sky sports arena",
              "sky sports f1",
              "laliga",
              "premier sports 1",
              "premier sports 2",
              "super football",
              "super premier league",
              "fox cricket 501 hd",
              "espn 1",
              "espn 2",
              "sky sports mix",
              "sky sports tennis",
              "sony sports3"
          }

          # Standard headers to bypass potential 403 Forbidden or security blocks
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }

          # 1. Download CRICHD_PAGE (Channel Template)
          try:
              r_page = requests.get(page_url, headers=headers, timeout=20)
              if r_page.status_code != 200:
                  print(f"Error: Failed to fetch CRICHD_PAGE. HTTP Status Code: {r_page.status_code}")
                  exit(1)
              page_content = r_page.text
          except Exception as e:
              print(f"Error fetching CRICHD_PAGE: {e}")
              exit(1)

          # 2. Download CRICHD (Actual Stream Source)
          try:
              r_source = requests.get(source_url, headers=headers, timeout=20)
              if r_source.status_code != 200:
                  print(f"Error: Failed to fetch CRICHD source. HTTP Status Code: {r_source.status_code}")
                  exit(1)
              source_content = r_source.text
          except Exception as e:
              print(f"Error fetching CRICHD source: {e}")
              exit(1)

          # Clone destination repository
          os.system(f"git clone https://x-access-token:{pat_token}@github.com/buzzinguaecn/Pizza.git pizza-repo")

          # 3. Parse CRICHD source data
          crichd_data = {}
          current_name = None
          current_vlcopts = []

          for line in source_content.splitlines():
              line_str = line.strip()
              if not line_str or line_str.startswith("#EXTM3U"):
                  continue
              
              if line_str.startswith("#EXTINF:"):
                  comma_idx = line_str.rfind(',')
                  if comma_idx != -1:
                      current_name = line_str[comma_idx+1:].strip().lower()
                  else:
                      current_name = None
                  current_vlcopts = []
              elif line_str.startswith("#EXTVLCOPT:"):
                  current_vlcopts.append(line_str)
              elif line_str.startswith("http://") or line_str.startswith("https://"):
                  if current_name:
                      crichd_data[current_name] = {
                          "vlcopts": current_vlcopts,
                          "url": line_str
                      }
                      current_name = None
                      current_vlcopts = []

          # 4. Map template against actual source and allowed channels list
          blocks = []
          for line in page_content.splitlines():
              line_str = line.strip()
              if not line_str or line_str.startswith("#EXTM3U"):
                  continue
              
              if line_str.startswith("#EXTINF:"):
                  comma_idx = line_str.rfind(',')
                  if comma_idx != -1:
                      page_chan_name = line_str[comma_idx+1:].strip()
                      page_key = page_chan_name.lower()
                      
                      # Match with CRICHD data and verify it is allowed
                      if page_key in crichd_data and page_key in ALLOWED_CHANNELS:
                          match = crichd_data[page_key]
                          block_lines = [line_str]
                          if match["vlcopts"]:
                              block_lines.extend(match["vlcopts"])
                          block_lines.append(match["url"])
                          
                          blocks.append("\n".join(block_lines))

          # Fetch Bangladesh Standard Time (UTC+6)
          bst_time = (datetime.now(timezone.utc) + timedelta(hours=6)).strftime('%Y-%m-%d %H:%M:%S')

          # Join blocks with exactly 2 blank lines (\n\n\n)
          blocks_content = "\n\n\n".join(blocks)
          final_content = f"#EXTM3U\n# Last Updated: {bst_time} (BST)\n\n\n{blocks_content}\n"

          # Save output (Overwrites the existing file)
          output_path = "pizza-repo/CRICHD.m3u"
          with open(output_path, "w", encoding="utf-8") as f:
              f.write(final_content)
          EOF
          python update_crichd.py

      - name: Commit and Push Changes
        run: |
          cd pizza-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the file to track modifications
          git add CRICHD.m3u
          
          # Check for changes and push
          if git diff --staged --quiet; then
            echo "No changes found. Commit skipped."
          else
            CURRENT_TIME=$(date -u -d "+6 hours" +"%Y-%m-%d %H:%M:%S")
            
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              COMMIT_MESSAGE="🆗 CricHD : Manual Trigger Done ✅ - $CURRENT_TIME 🟡"
            else
              COMMIT_MESSAGE="🆗 CricHD : Scheduled Auto Update Done ✅ - $CURRENT_TIME 🟡"
            fi
            
            git commit -m "$COMMIT_MESSAGE"
            git push origin main
          fi
