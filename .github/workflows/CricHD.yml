name: CricHD Auto Update

on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  update-crichd:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout JobFile repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install requests
      run: pip install requests

    - name: Generate M3U Playlist
      env:
        CRICHD_PAGE: ${{ secrets.CRICHD_PAGE }}
        CRICHD: ${{ secrets.CRICHD }}
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }} # আপনার টোকেন এখানে ব্যবহার করা হয়েছে
      run: |
        cat << 'EOF' > update_crichd.py
        import os
        import requests
        import re

        page_url = os.getenv("CRICHD_PAGE")
        source_url = os.getenv("CRICHD")
        pat_token = os.getenv("PAT_TOKEN")

        if not page_url or not source_url:
            print("Error: CRICHD_PAGE or CRICHD secrets are not set.")
            exit(1)

        # প্রাইভেট রিপোজিটরির ফাইল অ্যাক্সেস করার জন্য টোকেন হেডার তৈরি
        headers = {"User-Agent": "Mozilla/5.0"}
        if pat_token:
            headers["Authorization"] = f"token {pat_token}"

        # ১. CRICHD_PAGE ডাউনলোড করা
        try:
            r_page = requests.get(page_url, headers=headers, timeout=20)
            if r_page.status_code != 200:
                r_page = requests.get(page_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=20)
                
            if r_page.status_code != 200:
                print(f"Error: Failed to fetch CRICHD_PAGE. Status: {r_page.status_code}")
                exit(1)
            page_content = r_page.text
        except Exception as e:
            print(f"Error fetching CRICHD_PAGE: {e}")
            exit(1)

        # ২. CRICHD সোর্স ডাউনলোড করা
        try:
            r_source = requests.get(source_url, headers=headers, timeout=20)
            if r_source.status_code != 200:
                r_source = requests.get(source_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=20)
                
            if r_source.status_code != 200:
                print(f"Error: Failed to fetch CRICHD source. Status: {r_source.status_code}")
                exit(1)
            source_content = r_source.text
        except Exception as e:
            print(f"Error fetching CRICHD source: {e}")
            exit(1)

        # ডেস্টিনেশন রিপোজিটরি ক্লোন করা
        os.system(f"git clone https://x-access-token:{pat_token}@github.com/buzzinguaecn/Pizza.git pizza-repo")

        # ফিল্টার চ্যানেল লিস্ট
        allowed_channels = {
            "star sports 1", "star sports 1 hindi", "ptv sports", "willow hd", "willow hd 2",
            "ten sports", "a sports hd", "sky sports cricket", "sky cinema", "tnt 1", "tnt 2",
            "tnt 3", "tnt 4", "sky sport nz 1", "sky sport nz 2", "sky sport nz 3", "sky sport nz 4",
            "sky sport nz 5", "sky sport 6 nz", "sky sport nz 7", "sky sport nz 8", "sky sport nz 9",
            "sky sports action", "sky sports golf", "sky sports premier league", "sky sports football",
            "sky sports arena", "sky sports f1", "laliga", "premier sports 1", "premier sports 2",
            "super football", "super premier league", "fox cricket 501 hd", "espn 1", "espn 2",
            "sky sports mix", "sky sports tennis", "sony sports3"
        }

        # ৩. CRICHD (সোর্স) থেকে চ্যানেল ডাটা পার্স করা
        crichd_data = {}
        current_name = None
        current_vlcopts = []

        for line in source_content.splitlines():
            line_str = line.strip()
            if not line_str or line_str.startswith("#EXTM3U"):
                continue
            
            if line_str.startswith("#EXTINF:"):
                comma_idx = line_str.rfind(',')
                if comma_idx != -1:
                    current_name = line_str[comma_idx+1:].strip().lower()
                else:
                    current_name = None
                current_vlcopts = []
            elif line_str.startswith("#EXTVLCOPT:"):
                current_vlcopts.append(line_str)
            elif line_str.startswith("http://") or line_str.startswith("https://"):
                if current_name:
                    crichd_data[current_name] = {
                        "vlcopts": current_vlcopts,
                        "url": line_str
                    }
                    current_name = None
                    current_vlcopts = []

        # ৪. CRICHD_PAGE অনুযায়ী ম্যাপিং করা
        blocks = []
        for line in page_content.splitlines():
            line_str = line.strip()
            if not line_str or line_str.startswith("#EXTM3U"):
                continue
            
            if line_str.startswith("#EXTINF:"):
                comma_idx = line_str.rfind(',')
                if comma_idx != -1:
                    page_chan_name = line_str[comma_idx+1:].strip()
                    page_key = page_chan_name.lower()
                    
                    if page_key in allowed_channels and page_key in crichd_data:
                        match = crichd_data[page_key]
                        block_lines = [line_str] # টেমপ্লেটের মূল EXTINF
                        if match["vlcopts"]:
                            block_lines.extend(match["vlcopts"])
                        block_lines.append(match["url"])
                        
                        blocks.append("\n".join(block_lines))

        # ৫. ২ লাইনের ফাকা গ্যাপ দিয়ে জয়েন করা
        blocks_content = "\n\n\n".join(blocks)
        final_content = f"#EXTM3U\n\n\n{blocks_content}\n"

        # ফাইলটি pizza-repo-তে সেভ করা
        output_path = "pizza-repo/CRICHD.m3u"
        with open(output_path, "w", encoding="utf-8") as f:
            f.write(final_content)
            
        print("Playlist generated successfully.")
        EOF
        python update_crichd.py

    - name: Commit and Push to Pizza Repository
      run: |
        cd pizza-repo
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add CRICHD.m3u
        git diff-index --quiet HEAD || git commit -m 'Auto-updated CRICHD.m3u playlist'
        git push origin main
