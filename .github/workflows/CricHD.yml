name: CricHD

on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর রান হবে
  workflow_dispatch: # প্রয়োজন হলে ম্যানুয়ালি রান করার জন্য

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Pizza Repository
      uses: actions/checkout@v4
      with:
        repository: buzzinguaecn/Pizza
        token: ${{ secrets.PAT }}
        ref: main
        path: pizza-repo

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Process and Update Playlist
      env:
        CRICHD_PAGE: ${{ secrets.CRICHD_PAGE }}
        CRICHD: ${{ secrets.CRICHD }}
      run: |
        python -c '
        import os
        import urllib.request

        page_url = os.environ.get("CRICHD_PAGE")
        src_url = os.environ.get("CRICHD")

        if not page_url or not src_url:
            print("Secrets are missing!")
            exit(1)

        # Headers to prevent HTTP 403 Forbidden errors
        headers = {"User-Agent": "Mozilla/5.0"}

        # Fetch CRICHD_PAGE
        req_page = urllib.request.Request(page_url, headers=headers)
        page_content = urllib.request.urlopen(req_page).read().decode("utf-8")

        # Fetch CRICHD Source
        req_src = urllib.request.Request(src_url, headers=headers)
        src_content = urllib.request.urlopen(req_src).read().decode("utf-8")

        # Function to extract channel name from #EXTINF line
        def get_channel_name(extinf_line):
            parts = extinf_line.rsplit(",", 1)
            if len(parts) > 1:
                return parts[1].strip()
            return None

        # Parse Source (CRICHD)
        src_channels = {}
        current_inf = None
        current_opts = []

        for line in src_content.splitlines():
            line = line.strip()
            if not line or line.startswith("#EXTM3U"):
                continue
            if line.startswith("#EXTINF:"):
                current_inf = line
                current_opts = []
            elif line.startswith("#EXTVLCOPT:"):
                current_opts.append(line)
            elif not line.startswith("#"):
                # This line is considered the streaming URL
                if current_inf:
                    name = get_channel_name(current_inf)
                    if name:
                        src_channels[name] = {
                            "opts": current_opts.copy(),
                            "url": line
                        }
                    current_inf = None
                    current_opts = []

        # Parse Page and Build Output Playlist
        output_lines = ["#EXTM3U"]

        for line in page_content.splitlines():
            line = line.strip()
            if line.startswith("#EXTINF:"):
                name = get_channel_name(line)
                if name and name in src_channels:
                    output_lines.append(line)
                    # Append VLCOPTS if they exist
                    for opt in src_channels[name]["opts"]:
                        output_lines.append(opt)
                    # Append Streaming URL
                    output_lines.append(src_channels[name]["url"])
                    # Append 2 blank lines (represented by empty strings)
                    output_lines.append("")
                    output_lines.append("")

        # Join lines and trim trailing whitespace/extra newlines at the end
        final_m3u = "\n".join(output_lines).rstrip() + "\n"

        # Write to Pizza Repository path
        with open("pizza-repo/CRICHD.m3u", "w", encoding="utf-8") as f:
            f.write(final_m3u)
        '

    - name: Commit and Push Changes
      run: |
        cd pizza-repo
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add CRICHD.m3u
        if git diff --staged --quiet; then
          echo "No changes detected. Skipping push."
        else
          git commit -m "Auto Update CricHD Playlist"
          git push origin main
        fi
