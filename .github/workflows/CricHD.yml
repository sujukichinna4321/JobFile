name: CricHD

on:
  schedule:
    - cron: '*/5 * * * *'  # يتم التشغيل كل 5 دقائق
  workflow_dispatch:  # خيار التشغيل اليدوي

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Generate Updated Playlist
        run: |
          python << 'PYEOF'
          import requests
          import re
          import os

          # الحصول على روابط URL من الأسرار (Secrets)
          page_url = os.environ.get('CRICHD_PAGE_URL')
          source_url = os.environ.get('CRICHD_SOURCE_URL')

          if not page_url or not source_url:
              print("❌ Secret URLs not found!")
              exit(1)

          print(f"📥 Page playlist: {page_url}")
          print(f"📥 Source playlist: {source_url}")

          # تحميل صفحة CRICHD_PAGE
          try:
              page_resp = requests.get(page_url, timeout=30)
              page_resp.raise_for_status()
              page_lines = page_resp.text.strip().split('\n')
              print(f"✅ Page playlist downloaded: {len(page_lines)} lines")
          except Exception as e:
              print(f"❌ Failed to download page playlist: {e}")
              exit(1)

          # تحميل مصدر CRICHD
          try:
              source_resp = requests.get(source_url, timeout=30)
              source_resp.raise_for_status()
              source_lines = source_resp.text.strip().split('\n')
              print(f"✅ Source playlist downloaded: {len(source_lines)} lines")
          except Exception as e:
              print(f"❌ Failed to download source playlist: {e}")
              exit(1)

          # أسماء القنوات المستهدفة للمطابقة
          target_channels = [
              "Sky Sports Cricket", "Sky Sports Football", "Sky Sports Golf", "Sky Sports Action",
              "Sky Sports Main Event", "Sky Sports News", "Sky Sports Tennis", "Sky Sports Mix",
              "Sky Sports Premier League", "Sky Sports F1", "TNT Sports 3", "TNT Sports 4",
              "TNT Sports 1", "Viaplay Sports 1 UK", "TNT Sports 2", "PTV Sports",
              "Viaplay Sports 2 UK", "LaLiga TV UK", "Star Sports 1", "Willow Cricket",
              "A Sports HD", "Ten Sports", "Willow Cricket Extra", "ESPN US", "Sky Sport 1 NZ",
              "ESPN 2 US", "Star Sports 1 Hindi", "Sky Sport 3 NZ", "Sky Sport 2 NZ",
              "Sky Sport 4 NZ", "Sky Sport 7 NZ", "Sky Sport 5 NZ", "Sky Sport 6 NZ",
              "Sky Sport 9 NZ", "Fox Deportes", "Sky Sport 8 NZ", "BeIn Sports USA",
              "Fox Sports 2 US", "Movistar #Vamos", "TUDN USA", "BeIn Sports HD 1 France",
              "Fox Sports 1 US", "Telemundo", "Movistar Deportes", "NBC", "DAZN 1 Spain",
              "DAZN 2 Spain", "DAZN 3 Spain", "BBC One", "DAZN 4 Spain", "LaLiga TV Hypermotion",
              "ITV 1", "BBC Two", "ITV4", "LaLiga TV Hypermotion 2", "Fox Soccer Plus",
              "Disney+ SP", "ESPN Deportes"
          ]

          # دالة مساعدة للحصول على اسم القناة من سطر EXTINF
          def get_channel_name(line):
              if line.startswith('#EXTINF:'):
                  # الاسم بعد آخر فاصلة هو اسم القناة
                  parts = line.split(',')
                  if len(parts) > 1:
                      return parts[-1].strip()
              return None

          # تحليل قائمة تشغيل المصدر وإنشاء كتل بناءً على القنوات
          source_blocks = {}
          i = 0
          while i < len(source_lines):
              line = source_lines[i].strip()
              if line.startswith('#EXTINF:'):
                  ch_name = get_channel_name(line)
                  if ch_name and ch_name in target_channels:
                      block_lines = [line]
                      i += 1
                      # جمع خيارات EXTVLCOPT وروابط البث أسفل EXTINF
                      while i < len(source_lines):
                          next_line = source_lines[i].strip()
                          if next_line.startswith('#EXTINF:'):
                              break
                          if next_line:  # تخطي السطور الفارغة
                              block_lines.append(next_line)
                          i += 1
                      source_blocks[ch_name] = '\n'.join(block_lines)
                      continue
              i += 1

          print(f"🔍 Found {len(source_blocks)} matching channels in source")

          # معالجة سطور EXTINF من قائمة تشغيل الصفحة لتوليد قائمة التشغيل النهائية
          final_lines = []
          i = 0
          while i < len(page_lines):
              line = page_lines[i].strip()
              if line.startswith('#EXTINF:'):
                  ch_name = get_channel_name(line)
                  if ch_name and ch_name in source_blocks:
                      # سطر EXTINF الخاص بالصفحة مع كتلة البث من المصدر
                      final_lines.append(line)
                      final_lines.append(source_blocks[ch_name].split('\n', 1)[1] if '\n' in source_blocks[ch_name] else '')
                      # تخطي السطور التالية لـ EXTINF باستثناء السطور المستبدلة
                      i += 1
                      while i < len(page_lines):
                          next_line = page_lines[i].strip()
                          if next_line.startswith('#EXTINF:'):
                              break
                          i += 1
                      # إضافة سطرين فارغين
                      final_lines.append('')
                      final_lines.append('')
                      continue
                  else:
                      final_lines.append(line)
              elif line.startswith('#EXTM3U'):
                  final_lines.append(line)
              i += 1

          # إضافة علامة EXTM3U في البداية إذا لم تكن موجودة
          if final_lines and not final_lines[0].startswith('#EXTM3U'):
              final_lines.insert(0, '#EXTM3U')

          content = '\n'.join(final_lines)
          
          # حفظ ملف المخرجات
          with open('CRICHD.m3u', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print(f"✅ Generated playlist: {len(content)} characters, {content.count('#EXTINF:')} entries")
          print("📋 First 15 lines of output:")
          for line in content.split('\n')[:15]:
              print(f"  {line}")
          PYEOF
        env:
          CRICHD_PAGE_URL: ${{ secrets.CRICHD_PAGE }}
          CRICHD_SOURCE_URL: ${{ secrets.CRICHD }}

      - name: Deploy to Pizza Repository
        run: |
          # استنساخ مستودع Pizza
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/buzzinguaecn/Pizza.git pizza-repo
          
          # نسخ الملف المولد
          cp CRICHD.m3u pizza-repo/CRICHD.m3u
          
          cd pizza-repo
          
          # تهيئة إعدادات Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # إرسال التعديلات ودفعها
          git add CRICHD.m3u
          git diff --staged --quiet || git commit -m "🔄 Auto-update CRICHD playlist [skip ci]"
          git push origin main
          
          echo "✅ Successfully pushed to buzzinguaecn/Pizza/main/CRICHD.m3u"
