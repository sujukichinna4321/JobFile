name: FIFA 2026-1

on:
  schedule:
    # প্রতি ৫ মিনিট পর পর রান হবে
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # ম্যানুয়ালি রান করার জন্য

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Update Script
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          FIFA26_SECRET: ${{ secrets.FIFA26 }}
          SOURCE_BINGSTREAM: ${{ secrets.SOURCE_BINGSTREAM }}
          SOURCE_AX: ${{ secrets.SOURCE_AX }}
        run: |
          cat << 'EOF' > update_playlist.py
          import os
          import re
          import urllib.request
          import subprocess

          # সিক্রেট ভেরিয়েবল গ্রহণ
          pat_token = os.environ.get('PAT_TOKEN', '')
          fifa26_secret = os.environ.get('FIFA26_SECRET', '')
          source_bingstream = os.environ.get('SOURCE_BINGSTREAM', '')
          source_ax = os.environ.get('SOURCE_AX', '')

          if not pat_token or not fifa26_secret:
              print("Error: Missing critical secrets PAT_TOKEN or FIFA26.")
              exit(1)

          # টার্গেট রিপোজিটরি ও ফাইল নেম আলাদা করা
          clean_path = fifa26_secret.replace('https://github.com/', '')
          parts = [p for p in clean_path.split('/') if p]
          if len(parts) >= 2:
              repo_owner_name = f"{parts[0]}/{parts[1]}"
              file_name = parts[-1]
          else:
              repo_owner_name = "buzzinguaecn/Pizza"
              file_name = "FIFA2026.m3u"

          print(f"Target Repo: {repo_owner_name}")
          print(f"Target File: {file_name}")

          # টার্গেট রিপোজিটরি ক্লোন
          clone_url = f"https://{pat_token}@github.com/{repo_owner_name}.git"
          repo_dir = "target_repo"
          if os.path.exists(repo_dir):
              subprocess.run(["rm", "-rf", repo_dir])
          
          clone_res = subprocess.run(["git", "clone", clone_url, repo_dir])
          if clone_res.returncode != 0:
              print("Failed to clone target repository.")
              exit(1)

          # সোর্স m3u থেকে ডাটা ফিল্টার করার ফাংশন
          def fetch_entries(url):
              entries = []
              if not url:
                  return entries
              print(f"Fetching from source: {url}")
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      content = response.read().decode('utf-8', errors='ignore')
              except Exception as e:
                  print(f"Error fetching from {url}: {e}")
                  return entries

              lines = content.splitlines()
              i = 0
              while i < len(lines):
                  line = lines[i].strip()
                  if line.startswith('#EXTINF:'):
                      # group-title এর মান খোঁজা
                      match = re.search(r'group-title\s*=\s*["\']([^"\']+)["\']', line, re.IGNORECASE)
                      if match:
                          g_title = match.group(1).strip().lower()
                          # গ্রুপ টাইটেলে কিওয়ার্ডগুলোর যেকোনো একটি থাকলেই ম্যাচ করবে
                          if 'football' in g_title or 'world cup' in g_title:
                              block_lines = []
                              # গ্রুপ টাইটেল পরিবর্তন করে 'FIFA World Cup' করা হচ্ছে
                              modified_line = re.sub(r'group-title\s*=\s*["\'][^"\']+["\']', 'group-title="FIFA World Cup"', line, flags=re.IGNORECASE)
                              block_lines.append(modified_line)
                              
                              # পরবর্তী অপশন ও স্ট্রিম লিংক সংগ্রহ করা
                              j = i + 1
                              url_found = False
                              while j < len(lines):
                                  next_line = lines[j].strip()
                                  if not next_line:
                                      j += 1
                                      continue
                                  
                                  if next_line.startswith('#EXTINF:'):
                                      break
                                  
                                  block_lines.append(next_line)
                                  
                                  if not next_line.startswith('#'):
                                      url_found = True
                                      break
                                  j += 1
                              
                              if url_found:
                                  entries.append("\n".join(block_lines))
                                  i = j # ইনডেক্স পজিশন আপডেট
                  i += 1
              return entries

          # উভয় সোর্সের ডাটা একত্র করা
          all_entries = []
          all_entries.extend(fetch_entries(source_bingstream))
          all_entries.extend(fetch_entries(source_ax))

          print(f"Total matched entries found: {len(all_entries)}")

          start_marker = "# 🟡🟡🟡🟡🟡🔵🔵🔵🔵🔵🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡 FIFA 2026 UPADTE HERE  🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🔵🔵🔵🔵🔵🟡🟡🟡🟡🟡"
          end_marker = "# 🔴🔴🔴🔴🔴🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🔴 FIFA 2026 ENDED HERE  🔴🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🟡🔴🔴🔴🔴🔴"

          # প্রতিটি এন্ট্রির মাঝে ঠিক ২ লাইন খালি রাখা
          if all_entries:
              replacement_data = "\n\n\n".join(all_entries)
          else:
              replacement_data = "# Not Found Data"

          target_file_path = os.path.join(repo_dir, file_name)

          if os.path.exists(target_file_path):
              with open(target_file_path, 'r', encoding='utf-8') as f:
                  file_content = f.read()
          else:
              file_content = "#EXTM3U\n"

          # ১০ লাইন খালি গ্যাপ দেওয়ার লজিক (rstrip/lstrip ব্যবহারে অতিরিক্ত স্পেস তৈরি হওয়া রোধ হবে)
          gap_above = "\n" * 11  # ১১টি নিউলাইন ক্যারেক্টার মানে ১০টি খালি লাইন
          gap_below = "\n" * 11

          # প্লেলিস্টে কমেন্ট ব্লকের ভেতরের ডাটা পরিবর্তন করা
          if start_marker in file_content and end_marker in file_content:
              parts = file_content.split(start_marker)
              before = parts[0]
              after = parts[1].split(end_marker)[1]
              new_content = before.rstrip() + gap_above + start_marker + "\n" + replacement_data + "\n" + end_marker + gap_below + after.lstrip()
          else:
              # কমেন্ট না থাকলে ১৫০ লাইনের পর অথবা ফাইলের শেষে নতুন করে ব্লক যুক্ত করা
              lines = file_content.splitlines()
              if len(lines) >= 150:
                  before_lines = lines[:150]
                  after_lines = lines[150:]
                  new_content = "\n".join(before_lines).rstrip() + gap_above + start_marker + "\n" + replacement_data + "\n" + end_marker + gap_below + "\n".join(after_lines).lstrip()
              else:
                  new_content = file_content.rstrip() + gap_above + start_marker + "\n" + replacement_data + "\n" + end_marker + gap_below

          # ফাইলে নতুন কন্টেন্ট সেভ করা
          with open(target_file_path, 'w', encoding='utf-8') as f:
              f.write(new_content)

          # পরিবর্তনগুলো গিটহাবে পুশ করা
          os.chdir(repo_dir)
          subprocess.run(["git", "config", "user.name", "github-actions[bot]"])
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"])
          
          status_res = subprocess.run(["git", "status", "--porcelain"], capture_output=True, text=True)
          if status_res.stdout.strip():
              subprocess.run(["git", "add", file_name])
              subprocess.run(["git", "commit", "-m", "Routine update for FIFA 2026 Playlist"])
              push_res = subprocess.run(["git", "push"])
              if push_res.returncode == 0:
                  print("Playlist successfully updated and pushed.")
              else:
                  print("Failed to push updates.")
          else:
              print("No changes found to update.")
          EOF
          
          # স্ক্রিপ্টটি রান করানো হচ্ছে
          python update_playlist.py
