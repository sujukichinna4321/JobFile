name: Update LiveEventSports Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout second account repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: sujukichinna4321/JobFile
          path: jobfile

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq moreutils

      - name: Update Playlist
        id: update
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          FIRST_RUN: ${{ github.event_name == 'schedule' && github.run_number == 1 }}
        run: |
          set -euo pipefail
          set +u  # associative array এর জন্য

          GH_PAGES_URL="https://raw.githubusercontent.com/buzzinguaecn/Pizza/gh-pages/LiveEventSports.m3u"
          TARGET_REPO="buzzinguaecn/Pizza"
          TARGET_BRANCH="main"
          TARGET_FILE="LiveEventSports.m3u"
          WORK_DIR="/tmp/playlist_update"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          # সোর্স প্লেলিস্ট (URL এবং গ্রুপ টাইটেল) - axsports এর গ্রুপ আলাদা
          declare -a SOURCE_URLS=(
            "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u"
            "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.m3u"
            "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u"
            "https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u"
            "https://raw.githubusercontent.com/srhady/Fancode-bd/main/main_playlist.m3u"
          )
          declare -a SOURCE_GROUPS=(
            "SAWARID سواريد - Tampad"
            "SAWARID سواريد - BingStream"
            "SAWARID سواريد - SonyLiv"
            "SAWARID سواريد - Axsports"
            "SAWARID سواريد - Fancode"
          )

          # ম্যাপিং সোর্স প্লেলিস্ট (শুধু URL)
          declare -a MAPPING_URLS=(
            "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/Pakistan-All-Urdu-All-Farsi.m3u"
            "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/All-TV.m3u"
          )

          # চ্যানেল ম্যাপিং
          declare -A CHANNEL_MAP
          CHANNEL_MAP["BTV National"]="BTV NATIONAL HD|BTV World|BTV"
          CHANNEL_MAP["BTV CTG"]="BTV CTG"
          CHANNEL_MAP["Somoy TV"]="Somoy News TV|Somoy TV"
          CHANNEL_MAP["Jamuna TV"]="Jamuna TV|JAMUNA TV|Jamuna"
          CHANNEL_MAP["Ekushey TV"]="Ekushey TV"
          CHANNEL_MAP["NTV BD"]="NTV"
          CHANNEL_MAP["NTV-Europe"]="NTV Europe"
          CHANNEL_MAP["Channel 24"]="Channel 24"
          CHANNEL_MAP["Deen TV"]="Deen TV"
          CHANNEL_MAP["SATV"]="SA TV"
          CHANNEL_MAP["GTV"]="Gazi TV"

          # ফাংশন: ডাউনলোড
          download_file() { curl -fsSL --max-time 30 -o "$2" "$1" || { echo "❌ ডাউনলোড ব্যর্থ: $1" >&2; return 1; }; }

          # ফাংশন: প্লেলিস্ট থেকে ব্লকগুলো আলাদা করা (প্রতিটি ব্লক = EXTINF থেকে পরবর্তী EXTINF বা EOF পর্যন্ত সব লাইন)
          # আউটপুট: প্রতিটি ব্লক একটি টেম্প ফাইলে, এবং ফাইলের পাথ stdout এ
          split_into_blocks() {
            local input="$1"
            local prefix="$2"
            local block_num=0
            local block_file=""
            local inside_block=0
            while IFS= read -r line; do
              if [[ "$line" == \#EXTINF* ]]; then
                if [ $inside_block -eq 1 ]; then
                  # আগের ব্লক শেষ
                  echo "$block_file"
                fi
                block_num=$((block_num+1))
                block_file="$WORK_DIR/${prefix}_block_${block_num}.txt"
                > "$block_file"
                inside_block=1
              fi
              if [ $inside_block -eq 1 ]; then
                echo "$line" >> "$block_file"
              fi
            done < "$input"
            if [ $inside_block -eq 1 ]; then
              echo "$block_file"
            fi
          }

          # ফাংশন: ব্লকের মধ্যে group-title প্রতিস্থাপন
          set_group_title_in_block() {
            local block_file="$1"
            local new_group="$2"
            local temp_file="${block_file}.tmp"
            sed -E 's/group-title="[^"]*"/group-title="'"$new_group"'"/' "$block_file" > "$temp_file"
            mv "$temp_file" "$block_file"
          }

          # ফাংশন: ব্লকে ফুটবল বা ক্রিকেট কীওয়ার্ড আছে কিনা (EXTINF + URL + অন্যান্য লাইন)
          is_football_or_cricket() {
            local block_file="$1"
            grep -qiE '(football|soccer|ফুটবল|cricket|ক্রিকেট)' "$block_file" && return 0 || return 1
          }

          # ফাংশন: সোর্স প্লেলিস্ট প্রক্রিয়া (ব্লক ফাইলের তালিকা আউটপুট)
          process_source() {
            local url="$1"
            local group="$2"
            local source_dir="$WORK_DIR/source_$RANDOM"
            mkdir -p "$source_dir"
            local playlist="$source_dir/playlist.m3u"
            download_file "$url" "$playlist" || return 1
            # ব্লক ফাইল তৈরি
            local blocks_file="$source_dir/blocks.lst"
            split_into_blocks "$playlist" "$group" > "$blocks_file"
            # প্রতিটি ব্লকে group-title পরিবর্তন
            while IFS= read -r blk; do
              set_group_title_in_block "$blk" "$group"
            done < "$blocks_file"
            # ফুটবল/ক্রিকেট বনাম অন্য ব্লক আলাদা
            local football_blocks=()
            local other_blocks=()
            while IFS= read -r blk; do
              if is_football_or_cricket "$blk"; then
                football_blocks+=("$blk")
              else
                other_blocks+=("$blk")
              fi
            done < "$blocks_file"
            # প্রথমে ফুটবল/ক্রিকেট, তারপর অন্যান্য
            for blk in "${football_blocks[@]}"; do
              cat "$blk" >> "$source_dir/merged.txt"
              echo "" >> "$source_dir/merged.txt"
            done
            for blk in "${other_blocks[@]}"; do
              cat "$blk" >> "$source_dir/merged.txt"
              echo "" >> "$source_dir/merged.txt"
            done
            cat "$source_dir/merged.txt"
          }

          # ------------------------------------------------------------
          # 1. gh-pages থেকে হেডার ও চ্যানেল ব্লক সংগ্রহ
          # ------------------------------------------------------------
          echo "📥 gh-pages প্লেলিস্ট ডাউনলোড..."
          download_file "$GH_PAGES_URL" "gh_pages.m3u" || exit 1
          awk '/^#EXTINF/{exit} {print}' "gh_pages.m3u" > "header.txt"
          # gh-pages চ্যানেল ব্লক (ম্যাপিংয়ের জন্য)
          declare -a GH_BLOCKS=()
          while IFS= read -r blk; do
            GH_BLOCKS+=("$blk")
          done < <(split_into_blocks "gh_pages.m3u" "gh")
          # ব্লকের মধ্যে থেকে EXTINF ও URLs বের করার ফাংশন (ম্যাপিংয়ের জন্য শুধু লিংক দরকার)
          extract_links_from_block() {
            local blk="$1"
            grep -E '^https?://' "$blk" || true
          }
          extract_extinf_from_block() {
            head -n1 "$blk"
          }
          # gh ব্লকের EXTINF ও URLs অ্যারেতে রাখি
          GH_EXTINF=()
          GH_URLS=()
          for blk in "${GH_BLOCKS[@]}"; do
            extinf=$(extract_extinf_from_block "$blk")
            urls=$(extract_links_from_block "$blk" | tr '\n' '|')
            GH_EXTINF+=("$extinf")
            GH_URLS+=("$urls")
          done

          # ------------------------------------------------------------
          # 2. সোর্স প্লেলিস্ট প্রক্রিয়া করে আউটপুট তৈরি
          # ------------------------------------------------------------
          SOURCE_OUTPUT="source_output.txt"
          > "$SOURCE_OUTPUT"
          for idx in "${!SOURCE_URLS[@]}"; do
            url="${SOURCE_URLS[$idx]}"
            group="${SOURCE_GROUPS[$idx]}"
            echo "🟢 প্রসেসিং সোর্স $((idx+1)): $group"
            # সোর্স প্রক্রিয়া
            tmp_out="$WORK_DIR/source_$idx.out"
            if process_source "$url" "$group" > "$tmp_out"; then
              # সেপারেটর লাইন
              echo "# 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟢 $group 🟢" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              cat "$tmp_out" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🆕 $group 👉 Updateded ✅" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
            else
              # কোনো চ্যানেল পাওয়া যায়নি
              echo "# 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟢 $group 🟢" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤NOT FOUND ANY CHANNELS🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🆕 $group 👉 Updateded ✅" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
            fi
          done

          # ------------------------------------------------------------
          # 3. ম্যাপিং সোর্স থেকে ম্যাপিং লিংক সংগ্রহ (পূর্বের মতো)
          # ------------------------------------------------------------
          LOCAL_OUTPUT="local_output.txt"
          > "$LOCAL_OUTPUT"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")
          MAPPING_FILE="$WORK_DIR/mapping_merged.m3u"
          > "$MAPPING_FILE"
          for map_url in "${MAPPING_URLS[@]}"; do
            echo "📥 ম্যাপিং সোর্স: $map_url"
            tmp_map="$WORK_DIR/map_$$.m3u"
            download_file "$map_url" "$tmp_map" && cat "$tmp_map" >> "$MAPPING_FILE"
          done
          declare -A MAPPING_CHANNELS
          # ম্যাপিং ফাইল থেকে ব্লক তৈরি করে সেখান থেকে নাম ও লিংক বের করি
          while IFS= read -r blk; do
            extinf=$(head -n1 "$blk")
            ch_name=$(echo "$extinf" | sed -n 's/.*,\(.*\)$/\1/p' | tr '[:upper:]' '[:lower:]')
            [ -z "$ch_name" ] && continue
            urls=$(grep -E '^https?://' "$blk" | tr '\n' '|')
            if [ -n "${MAPPING_CHANNELS[$ch_name]-}" ]; then
              MAPPING_CHANNELS[$ch_name]="${MAPPING_CHANNELS[$ch_name]}|$urls"
            else
              MAPPING_CHANNELS[$ch_name]="$urls"
            fi
          done < <(split_into_blocks "$MAPPING_FILE" "map")
          # gh-pages চ্যানেলের জন্য ম্যাপিং
          for i in "${!GH_EXTINF[@]}"; do
            extinf="${GH_EXTINF[$i]}"
            old_urls_str="${GH_URLS[$i]}"
            IFS='|' read -ra old_urls <<< "$old_urls_str"
            channel_name_full=$(echo "$extinf" | sed -n 's/.*,\(.*\)$/\1/p')
            keywords=""
            for key in "${!CHANNEL_MAP[@]}"; do
              if [[ "$channel_name_full" == "$key" ]]; then
                keywords="${CHANNEL_MAP[$key]}"
                break
              fi
            done
            new_links=()
            if [ -n "$keywords" ]; then
              IFS='|' read -ra kw_array <<< "$keywords"
              for kw in "${kw_array[@]}"; do
                kw_lower=$(echo "$kw" | tr '[:upper:]' '[:lower:]')
                for map_ch in "${!MAPPING_CHANNELS[@]}"; do
                  if [[ "$map_ch" == *"$kw_lower"* ]]; then
                    IFS='|' read -ra map_urls <<< "${MAPPING_CHANNELS[$map_ch]}"
                    for link in "${map_urls[@]}"; do
                      new_links+=("$link")
                    done
                  fi
                done
              done
            fi
            final_new_links=()
            skipped_links=()
            for link in "${new_links[@]}"; do
              duplicate=0
              for old in "${old_urls[@]}"; do
                if [[ "$link" == "$old" ]]; then
                  duplicate=1
                  break
                fi
              done
              if [ $duplicate -eq 1 ]; then
                skipped_links+=("$link")
              else
                final_new_links+=("$link")
              fi
            done
            if [ ${#final_new_links[@]} -eq 0 ] && [ ${#skipped_links[@]} -gt 0 ]; then
              echo "#AUTO-UPDATED - $channel_name_full ⛔ SKIPPED ⛔ - $TIMESTAMP 🟡 - 🔄 - 🔴" >> "$LOCAL_OUTPUT"
              for skip in "${skipped_links[@]}"; do
                echo "#🔴 Duplicate Link Found 🔴 $skip" >> "$LOCAL_OUTPUT"
              done
            elif [ ${#final_new_links[@]} -gt 0 ]; then
              echo "#AUTO-UPDATED - $channel_name_full ✅- $TIMESTAMP 🟡 - 🔄 - 🔴" >> "$LOCAL_OUTPUT"
              for link in "${final_new_links[@]}"; do
                echo "$link" >> "$LOCAL_OUTPUT"
              done
              for old in "${old_urls[@]}"; do
                echo "$old" >> "$LOCAL_OUTPUT"
              done
              for skip in "${skipped_links[@]}"; do
                echo "#🔴 Duplicate Link Found 🔴 $skip" >> "$LOCAL_OUTPUT"
              done
            else
              echo "$extinf" >> "$LOCAL_OUTPUT"
              for old in "${old_urls[@]}"; do
                echo "$old" >> "$LOCAL_OUTPUT"
              done
            fi
            echo "" >> "$LOCAL_OUTPUT"
            echo "" >> "$LOCAL_OUTPUT"
          done

          # ------------------------------------------------------------
          # 4. ফাইনাল প্লেলিস্ট তৈরি
          # ------------------------------------------------------------
          FINAL_PLAYLIST="$WORK_DIR/$TARGET_FILE"
          > "$FINAL_PLAYLIST"
          cat "header.txt" >> "$FINAL_PLAYLIST"
          echo "" >> "$FINAL_PLAYLIST"
          cat "$SOURCE_OUTPUT" >> "$FINAL_PLAYLIST"
          echo "# 🟡🟡🟡🟡🟡🟡🟡🟡🟡 Local Channel Updated  🟡🟡🟡🟡🟡🟡🟡🟡🟡" >> "$FINAL_PLAYLIST"
          echo "" >> "$FINAL_PLAYLIST"
          cat "$LOCAL_OUTPUT" >> "$FINAL_PLAYLIST"
          echo "✅ প্লেলিস্ট তৈরি সম্পন্ন"

          # ------------------------------------------------------------
          # 5. গিটহাবে পুশ করা
          # ------------------------------------------------------------
          echo "📤 পুশ করা হচ্ছে $TARGET_REPO এ..."
          CLONE_DIR="$WORK_DIR/repo_clone"
          git clone "https://x-access-token:$PAT_TOKEN@github.com/$TARGET_REPO.git" "$CLONE_DIR"
          cd "$CLONE_DIR"
          git checkout "$TARGET_BRANCH"
          cp "$FINAL_PLAYLIST" "$TARGET_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            COMMIT_MSG="🆗 Live Event Sports : 🆕 Start Done ✅ - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          elif [ "$FIRST_RUN" == "true" ]; then
            COMMIT_MSG="🆗 Live Event Sports : 🆕 Start 🆕 - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          else
            COMMIT_MSG="🆗 Live Event Sports : 🔄 Updated Done ✅ - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi
          git add "$TARGET_FILE"
          if ! git diff --staged --quiet; then
            git commit -m "$COMMIT_MSG"
            git push origin "$TARGET_BRANCH"
            echo "✅ সফলভাবে পুশ করা হয়েছে"
          else
            echo "ℹ️ কোনো পরিবর্তন নেই"
          fi
