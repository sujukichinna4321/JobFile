name: Update LiveEventSports Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout second account repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: sujukichinna4321/JobFile
          path: jobfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Update playlist
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          FIRST_RUN: ${{ github.event_name == 'schedule' && github.run_number == 1 }}
        run: python3 - << 'EOF'
import os
import re
import requests
import sys
from datetime import datetime
from collections import OrderedDict

# ------------------------------------------------------------
# কনফিগারেশন
# ------------------------------------------------------------
GH_PAGES_URL = "https://raw.githubusercontent.com/buzzinguaecn/Pizza/gh-pages/LiveEventSports.m3u"
TARGET_REPO = "buzzinguaecn/Pizza"
TARGET_BRANCH = "main"
TARGET_FILE = "LiveEventSports.m3u"

SOURCE_URLS = [
    "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u",
    "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.m3u",
    "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u",
    "https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u",
    "https://raw.githubusercontent.com/srhady/Fancode-bd/main/main_playlist.m3u",
]
SOURCE_GROUPS = [
    "SAWARID سواريد - Tampad",
    "SAWARID سواريد - BingStream",
    "SAWARID سواريد - SonyLiv",
    "SAWARID سواريد - Axsports",
    "SAWARID سواريد - Fancode",
]

MAPPING_URLS = [
    "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/Pakistan-All-Urdu-All-Farsi.m3u",
    "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/All-TV.m3u",
]

CHANNEL_MAP = {
    "BTV National": ["BTV NATIONAL HD", "BTV World", "BTV"],
    "BTV CTG": ["BTV CTG"],
    "Somoy TV": ["Somoy News TV", "Somoy TV"],
    "Jamuna TV": ["Jamuna TV", "JAMUNA TV", "Jamuna"],
    "Ekushey TV": ["Ekushey TV"],
    "NTV BD": ["NTV"],
    "NTV-Europe": ["NTV Europe"],
    "Channel 24": ["Channel 24"],
    "Deen TV": ["Deen TV"],
    "SATV": ["SA TV"],
    "GTV": ["Gazi TV"],
}

# ------------------------------------------------------------
# ইউটিলিটি ফাংশন
# ------------------------------------------------------------
def download(url):
    try:
        r = requests.get(url, timeout=30)
        r.raise_for_status()
        return r.text
    except Exception as e:
        print(f"❌ ডাউনলোড ব্যর্থ {url}: {e}", file=sys.stderr)
        return None

def split_blocks(content):
    """প্লেলিস্টকে ব্লকে ভাগ করে (প্রতি ব্লক: EXTINF থেকে পরবর্তী EXTINF বা EOF পর্যন্ত সব লাইন)"""
    lines = content.splitlines()
    blocks = []
    current_block = []
    for line in lines:
        if line.startswith("#EXTINF"):
            if current_block:
                blocks.append("\n".join(current_block))
                current_block = []
        current_block.append(line)
    if current_block:
        blocks.append("\n".join(current_block))
    return blocks

def fix_group_title(block, new_group):
    """ব্লকের প্রথম লাইনে group-title পরিবর্তন করে"""
    lines = block.splitlines()
    if lines:
        lines[0] = re.sub(r'group-title="[^"]*"', f'group-title="{new_group}"', lines[0])
    return "\n".join(lines)

def is_football_cricket(block):
    """ব্লকে ফুটবল/ক্রিকেট কীওয়ার্ড আছে কিনা"""
    return bool(re.search(r'(football|soccer|ফুটবল|cricket|ক্রিকেট)', block, re.IGNORECASE))

def process_source(url, group):
    """একটি সোর্স প্লেলিস্ট প্রক্রিয়া করে আউটপুট ব্লকগুলোর তালিকা ফেরত দেয়"""
    content = download(url)
    if not content:
        return None
    blocks = split_blocks(content)
    if not blocks:
        return None
    # group-title ঠিক করা
    fixed_blocks = [fix_group_title(blk, group) for blk in blocks]
    # ফুটবল/ক্রিকেট আলাদা
    football = [blk for blk in fixed_blocks if is_football_cricket(blk)]
    others = [blk for blk in fixed_blocks if not is_football_cricket(blk)]
    return football + others   # প্রথমে ফুটবল/ক্রিকেট

def extract_channel_name(extinf_line):
    """EXTINF লাইন থেকে চ্যানেলের নাম বের করে"""
    match = re.search(r',([^,]+)$', extinf_line)
    return match.group(1).strip() if match else ""

def extract_urls(block):
    """ব্লক থেকে সব URL লাইন (http:// বা https:// দিয়ে শুরু) বের করে"""
    lines = block.splitlines()
    urls = [line for line in lines if line.startswith(('http://', 'https://'))]
    return urls

def extract_first_extinf(block):
    """ব্লকের প্রথম লাইন (EXTINF) ফেরত দেয়"""
    return block.splitlines()[0]

# ------------------------------------------------------------
# 1. gh-pages প্লেলিস্ট প্রক্রিয়া
# ------------------------------------------------------------
print("📥 gh-pages ডাউনলোড...")
gh_content = download(GH_PAGES_URL)
if not gh_content:
    print("⚠️ gh-pages ডাউনলোড ব্যর্থ, লোকাল চ্যানেল ছাড়া চলবে")
    header = "#EXTM3U\n# 👉 gh-pages unavailable\n"
    gh_blocks = []
else:
    lines = gh_content.splitlines()
    header_lines = []
    for line in lines:
        if line.startswith("#EXTINF"):
            break
        header_lines.append(line)
    header = "\n".join(header_lines)
    gh_blocks = split_blocks(gh_content)

gh_extinf_list = []
gh_urls_list = []
for blk in gh_blocks:
    extinf = extract_first_extinf(blk)
    urls = extract_urls(blk)
    gh_extinf_list.append(extinf)
    gh_urls_list.append(urls)

# ------------------------------------------------------------
# 2. সোর্স প্লেলিস্ট প্রক্রিয়া করে আউটপুট তৈরি
# ------------------------------------------------------------
source_output_lines = []
for idx, (url, grp) in enumerate(zip(SOURCE_URLS, SOURCE_GROUPS)):
    print(f"🟢 প্রসেসিং সোর্স {idx+1}: {grp}")
    processed = process_source(url, grp)
    source_output_lines.append("# 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴")
    source_output_lines.append("")
    source_output_lines.append(f"# 🟢 {grp} 🟢")
    source_output_lines.append("")
    if processed is None:
        source_output_lines.append("# 🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤NOT FOUND ANY CHANNELS🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤")
    else:
        for blk in processed:
            source_output_lines.append(blk)
            source_output_lines.append("")   # এক ফাঁকা লাইন
            source_output_lines.append("")   # দুই ফাঁকা লাইন (নির্দেশ অনুযায়ী)
    source_output_lines.append("")
    source_output_lines.append(f"# 🆕 {grp} 👉 Updateded ✅")
    source_output_lines.append("")
    source_output_lines.append("")

# ------------------------------------------------------------
# 3. ম্যাপিং ও লোকাল চ্যানেল আপডেট
# ------------------------------------------------------------
local_output_lines = []
timestamp = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S")

if gh_blocks:
    # ম্যাপিং সোর্স একত্রিত
    mapping_content = ""
    for map_url in MAPPING_URLS:
        print(f"📥 ম্যাপিং সোর্স: {map_url}")
        cont = download(map_url)
        if cont:
            mapping_content += cont + "\n"
    # ম্যাপিং ব্লক থেকে নাম ও URL ডিকশনারি
    map_blocks = split_blocks(mapping_content) if mapping_content else []
    mapping_dict = {}
    for blk in map_blocks:
        extinf = extract_first_extinf(blk)
        ch_name = extract_channel_name(extinf).lower()
        if not ch_name:
            continue
        urls = extract_urls(blk)
        if ch_name in mapping_dict:
            mapping_dict[ch_name].extend(urls)
        else:
            mapping_dict[ch_name] = urls

    # প্রতিটি gh-pages চ্যানেলের জন্য ম্যাপিং
    for extinf, old_urls in zip(gh_extinf_list, gh_urls_list):
        ch_name_full = extract_channel_name(extinf)
        # কীওয়ার্ড খোঁজ (case-sensitive exact match)
        keywords = CHANNEL_MAP.get(ch_name_full, [])
        new_links = []
        if keywords:
            for kw in keywords:
                kw_lower = kw.lower()
                for map_ch, map_links in mapping_dict.items():
                    if kw_lower in map_ch:
                        new_links.extend(map_links)
        # ডুপ্লিকেট চেক
        final_new = []
        skipped = []
        for link in new_links:
            if link in old_urls:
                skipped.append(link)
            else:
                final_new.append(link)
        # আউটপুট ব্লক তৈরি
        if not final_new and skipped:
            local_output_lines.append(f"#AUTO-UPDATED - {ch_name_full} ⛔ SKIPPED ⛔ - {timestamp} 🟡 - 🔄 - 🔴")
            for s in skipped:
                local_output_lines.append(f"#🔴 Duplicate Link Found 🔴 {s}")
        elif final_new:
            local_output_lines.append(f"#AUTO-UPDATED - {ch_name_full} ✅- {timestamp} 🟡 - 🔄 - 🔴")
            for ln in final_new:
                local_output_lines.append(ln)
            for old in old_urls:
                local_output_lines.append(old)
            for s in skipped:
                local_output_lines.append(f"#🔴 Duplicate Link Found 🔴 {s}")
        else:
            local_output_lines.append(extinf)
            for old in old_urls:
                local_output_lines.append(old)
        local_output_lines.append("")
        local_output_lines.append("")
else:
    local_output_lines.append("⚠️ gh-pages উপলব্ধ নয়, লোকাল চ্যানেল ব্লক খালি")

# ------------------------------------------------------------
# 4. ফাইনাল প্লেলিস্ট তৈরি
# ------------------------------------------------------------
final_playlist_lines = []
final_playlist_lines.append(header)
final_playlist_lines.append("")
final_playlist_lines.extend(source_output_lines)
final_playlist_lines.append("# 🟡🟡🟡🟡🟡🟡🟡🟡🟡 Local Channel Updated  🟡🟡🟡🟡🟡🟡🟡🟡🟡")
final_playlist_lines.append("")
final_playlist_lines.extend(local_output_lines)

final_content = "\n".join(final_playlist_lines)
print("✅ প্লেলিস্ট তৈরি সম্পন্ন")

# ------------------------------------------------------------
# 5. গিটহাবে পুশ (API ব্যবহার করে)
# ------------------------------------------------------------
token = os.environ.get("PAT_TOKEN")
if not token:
    print("❌ PAT_TOKEN সেট করা নেই", file=sys.stderr)
    sys.exit(1)

url = f"https://api.github.com/repos/{TARGET_REPO}/contents/{TARGET_FILE}"
headers = {
    "Authorization": f"Bearer {token}",
    "Accept": "application/vnd.github.v3+json"
}
# বর্তমান ফাইলের SHA পাওয়া
resp = requests.get(url, headers=headers)
sha = resp.json().get("sha") if resp.status_code == 200 else None

import base64
encoded = base64.b64encode(final_content.encode()).decode()
data = {
    "message": f"Auto-update playlist {datetime.utcnow().isoformat()}",
    "content": encoded,
    "branch": TARGET_BRANCH
}
if sha:
    data["sha"] = sha

resp = requests.put(url, headers=headers, json=data)
if resp.status_code in (200, 201):
    print("✅ সফলভাবে পুশ করা হয়েছে")
else:
    print(f"❌ পুশ ব্যর্থ: {resp.status_code} - {resp.text}", file=sys.stderr)
    sys.exit(1)
EOF
