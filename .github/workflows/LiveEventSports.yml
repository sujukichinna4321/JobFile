name: Update LiveEventSports Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout second account repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: sujukichinna4321/JobFile
          path: jobfile

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq moreutils

      - name: Update Playlist
        id: update
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          FIRST_RUN: ${{ github.event_name == 'schedule' && github.run_number == 1 }}
        run: |
          set -euo pipefail
          # (নিচে পুরো স্ক্রিপ্ট দেওয়া হবে। দৈর্ঘ্যের জন্য আমি ধাপে ধাপে লিখছি, সম্পূর্ণ YAML শেষে দেব)
