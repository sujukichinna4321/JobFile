name: Update LiveEventSports Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout second account repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: sujukichinna4321/JobFile
          path: jobfile

      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Update Playlist
        id: update
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          FIRST_RUN: ${{ github.event_name == 'schedule' && github.run_number == 1 }}
        run: |
          set -euxo pipefail   # -x যোগ করে প্রতিটি কমান্ড লগ করবে
          WORK_DIR="/tmp/playlist_update"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          GH_PAGES_URL="https://raw.githubusercontent.com/buzzinguaecn/Pizza/gh-pages/LiveEventSports.m3u"
          TARGET_REPO="buzzinguaecn/Pizza"
          TARGET_BRANCH="main"
          TARGET_FILE="LiveEventSports.m3u"
          
          SOURCE_URLS=(
            "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u"
            "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.m3u"
            "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u"
            "https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u"
            "https://raw.githubusercontent.com/srhady/Fancode-bd/main/main_playlist.m3u"
          )
          SOURCE_GROUPS=(
            "SAWARID سواريد - Tampad"
            "SAWARID سواريد - BingStream"
            "SAWARID سواريد - SonyLiv"
            "SAWARID سواريد - Axsports"
            "SAWARID سواريد - Fancode"
          )
          
          MAPPING_URLS=(
            "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/Pakistan-All-Urdu-All-Farsi.m3u"
            "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/All-TV.m3u"
          )
          
          declare -A CHANNEL_MAP
          CHANNEL_MAP["BTV National"]="BTV NATIONAL HD|BTV World|BTV"
          CHANNEL_MAP["BTV CTG"]="BTV CTG"
          CHANNEL_MAP["Somoy TV"]="Somoy News TV|Somoy TV"
          CHANNEL_MAP["Jamuna TV"]="Jamuna TV|JAMUNA TV|Jamuna"
          CHANNEL_MAP["Ekushey TV"]="Ekushey TV"
          CHANNEL_MAP["NTV BD"]="NTV"
          CHANNEL_MAP["NTV-Europe"]="NTV Europe"
          CHANNEL_MAP["Channel 24"]="Channel 24"
          CHANNEL_MAP["Deen TV"]="Deen TV"
          CHANNEL_MAP["SATV"]="SA TV"
          CHANNEL_MAP["GTV"]="Gazi TV"
          
          download() {
            local url="$1" out="$2"
            echo "⏳ ডাউনলোড: $url"
            curl -fsSL --retry 3 --max-time 30 -o "$out" "$url" || { echo "❌ ডাউনলোড ব্যর্থ: $url"; return 1; }
            echo "✅ ডাউনলোড সফল: $out ($(wc -c < "$out") bytes)"
          }
          
          # সরলীকৃত split_blocks (নিরাপদ)
          split_blocks() {
            local input="$1" prefix="$2"
            local block_num=0 block_file
            local in_block=0
            while IFS= read -r line; do
              if [[ "$line" == \#EXTINF* ]]; then
                if [[ $in_block -eq 1 ]]; then
                  echo "$block_file"
                fi
                block_num=$((block_num+1))
                block_file="$WORK_DIR/${prefix}_block_${block_num}.txt"
                > "$block_file"
                in_block=1
              fi
              if [[ $in_block -eq 1 ]]; then
                printf '%s\n' "$line" >> "$block_file"
              fi
            done < "$input"
            if [[ $in_block -eq 1 ]]; then
              echo "$block_file"
            fi
          }
          
          fix_group_title() {
            sed -i -E 's/group-title="[^"]*"/group-title="'"$2"'"/' "$1"
          }
          
          is_football_cricket() {
            grep -qiE '(football|soccer|ফুটবল|cricket|ক্রিকেট)' "$1"
          }
          
          process_source() {
            local url="$1" grp="$2"
            local tmp_dir="$WORK_DIR/source_$$_$RANDOM"
            mkdir -p "$tmp_dir"
            local playlist="$tmp_dir/playlist.m3u"
            download "$url" "$playlist" || { rm -rf "$tmp_dir"; return 1; }
            local blocks_file="$tmp_dir/blocks.lst"
            split_blocks "$playlist" "$grp" > "$blocks_file"
            if [[ ! -s "$blocks_file" ]]; then
              rm -rf "$tmp_dir"
              return 1
            fi
            while IFS= read -r blk; do
              fix_group_title "$blk" "$grp"
            done < "$blocks_file"
            local football=() other=()
            while IFS= read -r blk; do
              if is_football_cricket "$blk"; then
                football+=("$blk")
              else
                other+=("$blk")
              fi
            done < "$blocks_file"
            local out_file="$tmp_dir/out.txt"
            > "$out_file"
            for blk in "${football[@]}"; do cat "$blk"; echo ""; done >> "$out_file"
            for blk in "${other[@]}"; do cat "$blk"; echo ""; done >> "$out_file"
            cat "$out_file"
            rm -rf "$tmp_dir"
          }
          
          echo "📥 gh-pages ডাউনলোড..."
          GH_AVAILABLE=true
          if download "$GH_PAGES_URL" "gh_pages.m3u"; then
            echo "✅ gh-pages ডাউনলোড সম্পন্ন"
            # হেডার বের করি (প্রথম #EXTINF এর আগের সব লাইন)
            awk '/^#EXTINF/{exit} {print}' "gh_pages.m3u" > "header.txt"
            # ব্লক তৈরি
            GH_BLOCKS=()
            while IFS= read -r blk; do
              GH_BLOCKS+=("$blk")
            done < <(split_blocks "gh_pages.m3u" "gh")
            GH_EXTINF=()
            GH_URLS=()
            for blk in "${GH_BLOCKS[@]}"; do
              extinf=$(head -n1 "$blk")
              urls=$(grep -E '^https?://' "$blk" | tr '\n' '|')
              GH_EXTINF+=("$extinf")
              GH_URLS+=("$urls")
            done
          else
            echo "⚠️ gh-pages ব্যর্থ, লোকাল চ্যানেল ছাড়া চলবে"
            GH_AVAILABLE=false
            echo "#EXTM3U" > "header.txt"
            echo "# 👉 gh-pages unavailable" >> "header.txt"
            GH_EXTINF=()
            GH_URLS=()
          fi
          
          SOURCE_OUTPUT="source_output.txt"
          > "$SOURCE_OUTPUT"
          for idx in "${!SOURCE_URLS[@]}"; do
            url="${SOURCE_URLS[$idx]}"
            grp="${SOURCE_GROUPS[$idx]}"
            echo "🟢 প্রসেসিং সোর্স $((idx+1)): $grp"
            if process_source "$url" "$grp" > "tmp_source_$idx.out" 2>/dev/null; then
              echo "# 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟢 $grp 🟢" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              cat "tmp_source_$idx.out" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🆕 $grp 👉 Updateded ✅" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
            else
              echo "# 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟢 $grp 🟢" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤NOT FOUND ANY CHANNELS🟤🟤🟤🟤🟤🟤🟤🟤🟤🟤 🟤" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "# 🆕 $grp 👉 Updateded ✅" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
              echo "" >> "$SOURCE_OUTPUT"
            fi
          done
          
          LOCAL_OUTPUT="local_output.txt"
          > "$LOCAL_OUTPUT"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")
          if [[ "$GH_AVAILABLE" == true ]]; then
            MAPPING_FILE="$WORK_DIR/mapping_merged.m3u"
            > "$MAPPING_FILE"
            for map_url in "${MAPPING_URLS[@]}"; do
              echo "📥 ম্যাপিং সোর্স: $map_url"
              tmp_map="$WORK_DIR/map_$$.m3u"
              if download "$map_url" "$tmp_map"; then
                cat "$tmp_map" >> "$MAPPING_FILE"
              else
                echo "⚠️ ম্যাপিং সোর্স ডাউনলোড ব্যর্থ: $map_url"
              fi
            done
            declare -A MAPPING_CHANNELS
            while IFS= read -r blk; do
              extinf=$(head -n1 "$blk")
              ch_name=$(echo "$extinf" | sed -n 's/.*,\(.*\)$/\1/p' | tr '[:upper:]' '[:lower:]')
              [[ -z "$ch_name" ]] && continue
              urls=$(grep -E '^https?://' "$blk" | tr '\n' '|')
              if [[ -n "${MAPPING_CHANNELS[$ch_name]-}" ]]; then
                MAPPING_CHANNELS[$ch_name]="${MAPPING_CHANNELS[$ch_name]}|$urls"
              else
                MAPPING_CHANNELS[$ch_name]="$urls"
              fi
            done < <(split_blocks "$MAPPING_FILE" "map")
            for i in "${!GH_EXTINF[@]}"; do
              extinf="${GH_EXTINF[$i]}"
              old_urls_str="${GH_URLS[$i]}"
              IFS='|' read -ra old_urls <<< "$old_urls_str"
              channel_name_full=$(echo "$extinf" | sed -n 's/.*,\(.*\)$/\1/p')
              keywords=""
              for key in "${!CHANNEL_MAP[@]}"; do
                if [[ "$channel_name_full" == "$key" ]]; then
                  keywords="${CHANNEL_MAP[$key]}"
                  break
                fi
              done
              new_links=()
              if [[ -n "$keywords" ]]; then
                IFS='|' read -ra kw_array <<< "$keywords"
                for kw in "${kw_array[@]}"; do
                  kw_lower=$(echo "$kw" | tr '[:upper:]' '[:lower:]')
                  for map_ch in "${!MAPPING_CHANNELS[@]}"; do
                    if [[ "$map_ch" == *"$kw_lower"* ]]; then
                      IFS='|' read -ra map_urls <<< "${MAPPING_CHANNELS[$map_ch]}"
                      for link in "${map_urls[@]}"; do
                        new_links+=("$link")
                      done
                    fi
                  done
                done
              fi
              final_new=()
              skipped=()
              for link in "${new_links[@]}"; do
                dup=0
                for old in "${old_urls[@]}"; do
                  [[ "$link" == "$old" ]] && { dup=1; break; }
                done
                if [[ $dup -eq 1 ]]; then
                  skipped+=("$link")
                else
                  final_new+=("$link")
                fi
              done
              if [[ ${#final_new[@]} -eq 0 && ${#skipped[@]} -gt 0 ]]; then
                echo "#AUTO-UPDATED - $channel_name_full ⛔ SKIPPED ⛔ - $TIMESTAMP 🟡 - 🔄 - 🔴" >> "$LOCAL_OUTPUT"
                for s in "${skipped[@]}"; do echo "#🔴 Duplicate Link Found 🔴 $s" >> "$LOCAL_OUTPUT"; done
              elif [[ ${#final_new[@]} -gt 0 ]]; then
                echo "#AUTO-UPDATED - $channel_name_full ✅- $TIMESTAMP 🟡 - 🔄 - 🔴" >> "$LOCAL_OUTPUT"
                for ln in "${final_new[@]}"; do echo "$ln" >> "$LOCAL_OUTPUT"; done
                for old in "${old_urls[@]}"; do echo "$old" >> "$LOCAL_OUTPUT"; done
                for s in "${skipped[@]}"; do echo "#🔴 Duplicate Link Found 🔴 $s" >> "$LOCAL_OUTPUT"; done
              else
                echo "$extinf" >> "$LOCAL_OUTPUT"
                for old in "${old_urls[@]}"; do echo "$old" >> "$LOCAL_OUTPUT"; done
              fi
              echo "" >> "$LOCAL_OUTPUT"
              echo "" >> "$LOCAL_OUTPUT"
            done
          else
            echo "⚠️ gh-pages উপলব্ধ নয়, লোকাল চ্যানেল ব্লক খালি" >> "$LOCAL_OUTPUT"
          fi
          
          FINAL_PLAYLIST="$WORK_DIR/$TARGET_FILE"
          > "$FINAL_PLAYLIST"
          cat "header.txt" >> "$FINAL_PLAYLIST"
          echo "" >> "$FINAL_PLAYLIST"
          cat "$SOURCE_OUTPUT" >> "$FINAL_PLAYLIST"
          echo "# 🟡🟡🟡🟡🟡🟡🟡🟡🟡 Local Channel Updated  🟡🟡🟡🟡🟡🟡🟡🟡🟡" >> "$FINAL_PLAYLIST"
          echo "" >> "$FINAL_PLAYLIST"
          cat "$LOCAL_OUTPUT" >> "$FINAL_PLAYLIST"
          echo "✅ প্লেলিস্ট তৈরি সম্পন্ন"
          
          echo "📤 পুশ করা হচ্ছে $TARGET_REPO এ..."
          git clone "https://x-access-token:$PAT_TOKEN@github.com/$TARGET_REPO.git" "$WORK_DIR/repo_clone"
          cd "$WORK_DIR/repo_clone"
          git checkout "$TARGET_BRANCH"
          cp "$FINAL_PLAYLIST" "$TARGET_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            COMMIT_MSG="🆗 Live Event Sports : 🆕 Start Done ✅ - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          elif [[ "$FIRST_RUN" == "true" ]]; then
            COMMIT_MSG="🆗 Live Event Sports : 🆕 Start 🆕 - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          else
            COMMIT_MSG="🆗 Live Event Sports : 🔄 Updated Done ✅ - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi
          
          git add "$TARGET_FILE"
          if ! git diff --staged --quiet; then
            git commit -m "$COMMIT_MSG"
            git push origin "$TARGET_BRANCH"
            echo "✅ সফলভাবে পুশ করা হয়েছে"
          else
            echo "ℹ️ কোনো পরিবর্তন নেই"
          fi
