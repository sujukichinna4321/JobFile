name: CricHD

on:
  schedule:
    - cron: '*/5 * * * *'  # প্রতি ৫ মিনিট পর পর রান হবে
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Generate Updated Playlist
        run: |
          python << 'PYEOF'
          import requests
          import os

          # সিক্রেট থেকে URL গুলো নেওয়া
          page_url = os.environ.get('CRICHD_PAGE_URL')
          source_url = os.environ.get('CRICHD_SOURCE_URL')
          source2_url = os.environ.get('CRICHD_SOURCE2_URL')

          # কঠোর নিরাপত্তা চেক (কোনো সিক্রেট মিসিং থাকলে রান ফেইল হবে)
          if not page_url:
              print("❌ Error: Secret 'CRICHD_PAGE' (CRICHD_PAGE_URL) is missing or empty!")
              exit(1)
          if not source_url:
              print("❌ Error: Secret 'CRICHD' (CRICHD_SOURCE_URL) is missing or empty!")
              exit(1)
          if not source2_url:
              print("❌ Error: Secret 'CRICHD_2ND' (CRICHD_SOURCE2_URL) is missing or empty!")
              print("👉 Please make sure you have added 'CRICHD_2ND' in your GitHub Repository Secrets.")
              exit(1)

          # প্লেলিস্ট ডাউনলোড ও লাইন ক্লিন করার ফাংশন
          def download_playlist(url, name):
              try:
                  resp = requests.get(url, timeout=30)
                  resp.raise_for_status()
                  # \r দূর করে লাইনগুলো ক্লিন করা হচ্ছে
                  lines = [line.strip().replace('\r', '') for line in resp.text.split('\n')]
                  print(f"✅ {name} downloaded successfully: {len(lines)} lines")
                  return lines
              except Exception as e:
                  print(f"❌ Error: Failed to download {name} from URL: {e}")
                  exit(1) # ডাউনলোড ব্যর্থ হলে রান বন্ধ হয়ে যাবে

          page_lines = download_playlist(page_url, "Page template")
          source_lines = download_playlist(source_url, "Source 1")
          source2_lines = download_playlist(source2_url, "Source 2")

          # চ্যানেলের নাম গুলো (ম্যাচ করার জন্য)
          target_channels = [
              "Star Sports 1", "Star Sports 1 Hindi", "PTV Sports",
              "Willow HD", "Willow HD 2", "Ten Sports", "A Sports HD",
              "Sky Sports Cricket", "Sky Cinema", "TNT 1", "TNT 2", "TNT 3", "TNT 4",
              "Sky Sport Nz 1", "Sky Sport Nz 2", "Sky Sport Nz 3", "Sky Sport Nz 4",
              "Sky Sport Nz 5", "Sky Sport 6 Nz", "Sky Sport Nz 7", "Sky Sport Nz 8",
              "Sky Sport Nz 9", "Sky Sports Action", "Sky Sports Golf",
              "Sky Sports Premier League", "Sky Sports Football", "Sky Sports Arena",
              "Sky Sports F1", "LaLiGA", "Premier Sports 1", "Premier Sports 2",
              "Super Football", "Super Premier League", "Fox Cricket 501 HD",
              "ESPN 1", "ESPN 2", "Sky Sports Mix", "Sky Sports Tennis",
              "Sony Sports3"
          ]

          # Helper function to get channel name from EXTINF line
          def get_channel_name(line):
              if line.startswith('#EXTINF:'):
                  parts = line.split(',')
                  if len(parts) > 1:
                      return parts[-1].strip()
              return None

          # সোর্স ফাইল থেকে শুধুমাত্র অপশন ও স্ট্রিমিং লিঙ্কের লাইনগুলো নিষ্কাশন করার ফাংশন
          def extract_streaming_data(lines):
              blocks = {}
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if line.startswith('#EXTINF:'):
                      ch_name = get_channel_name(line)
                      if ch_name and ch_name in target_channels:
                          stream_lines = []
                          i += 1
                          # #EXTINF এর নিচের #EXTVLCOPT এবং স্ট্রিমিং URL সংগ্রহ
                          while i < len(lines):
                              next_line = lines[i]
                              if next_line.startswith('#EXTINF:'):
                                  break
                              if next_line:  # খালি লাইন বাদ দিয়ে
                                  stream_lines.append(next_line)
                              i += 1
                          blocks[ch_name] = stream_lines
                          continue
                  i += 1
              return blocks

          # দুটি সোর্স থেকেই পৃথকভাবে ডাটা নিষ্কাশন
          source1_blocks = extract_streaming_data(source_lines)
          source2_blocks = extract_streaming_data(source2_lines)

          # কনসোলে বিস্তারিত লগ প্রিন্ট (কোন সোর্স থেকে কী পেলো তা দেখতে পাবেন)
          print(f"\n📊 --- Source 1 (CRICHD) Extracted Channels ({len(source1_blocks)}) ---")
          for ch in sorted(source1_blocks.keys()):
              print(f"  - {ch}")

          print(f"\n📊 --- Source 2 (CRICHD_2ND) Extracted Channels ({len(source2_blocks)}) ---")
          for ch in sorted(source2_blocks.keys()):
              print(f"  - {ch}")

          # দুটি সোর্সের ডাটা একই চ্যানেলের আন্ডারে একত্র (merge) করা হচ্ছে
          combined_blocks = {}
          for ch in target_channels:
              combined_lines = []
              if ch in source1_blocks:
                  combined_lines.extend(source1_blocks[ch])
              if ch in source2_blocks:
                  combined_lines.extend(source2_blocks[ch])
              
              if combined_lines:
                  combined_blocks[ch] = combined_lines

          print(f"\n🔍 Combined streaming blocks created for {len(combined_blocks)} channels.")

          # Page template থেকে EXTINF লাইন গুলো প্রসেস করে ফাইনাল প্লেলিস্ট তৈরি
          final_lines = []
          i = 0
          while i < len(page_lines):
              line = page_lines[i]
              if line.startswith('#EXTINF:'):
                  ch_name = get_channel_name(line)
                  if ch_name and ch_name in combined_blocks:
                      # Page এর নিজস্ব আসল EXTINF লাইনটি প্রথমে বসবে
                      final_lines.append(line)
                      # এরপর ১ম ও ২য় সোর্স থেকে নেওয়া অপশন ও স্ট্রিমিং লিঙ্কগুলো পরপর বসে যাবে
                      final_lines.extend(combined_blocks[ch_name])
                      
                      # Page-এর নিজস্ব পুরানো অপশন ও স্ট্রিমিং লিঙ্কগুলো স্কিপ করা হচ্ছে
                      i += 1
                      while i < len(page_lines):
                          next_line = page_lines[i]
                          if next_line.startswith('#EXTINF:'):
                              break
                          i += 1
                      # প্রতি চ্যানেলের ব্লকের পর ফাকা লাইন
                      final_lines.append('')
                      final_lines.append('')
                      continue
                  else:
                      final_lines.append(line)
              elif line.startswith('#EXTM3U'):
                  final_lines.append(line)
              i += 1

          # যদি #EXTM3U না থাকে, প্রথমে বসানো
          if final_lines and not final_lines[0].startswith('#EXTM3U'):
              final_lines.insert(0, '#EXTM3U')

          content = '\n'.join(final_lines)
          
          # আউটপুট ফাইল সংরক্ষণ
          with open('CRICHD.m3u', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print(f"✅ Generated playlist: {len(content)} characters, {content.count('#EXTINF:')} entries")
          PYEOF
        env:
          CRICHD_PAGE_URL: ${{ secrets.CRICHD_PAGE }}
          CRICHD_SOURCE_URL: ${{ secrets.CRICHD }}
          CRICHD_SOURCE2_URL: ${{ secrets.CRICHD_2ND }}

      - name: Deploy to Pizza Repository
        run: |
          # Pizza রিপোজিটরি ক্লোন
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/buzzinguaecn/Pizza.git pizza-repo
          
          # জেনারেট করা ফাইল কপি
          cp CRICHD.m3u pizza-repo/CRICHD.m3u
          
          cd pizza-repo
          
          # Git কনফিগ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # কমিট এবং পুশ
          git add CRICHD.m3u
          git diff --staged --quiet || git commit -m "🔄 Auto-update CRICHD playlist [skip ci]"
          git push origin main
          
          echo "✅ Successfully pushed to buzzinguaecn/Pizza/main/CRICHD.m3u"
