name: CricHD

on:
  schedule:
    - cron: '*/5 * * * *'  # প্রতি ৫ মিনিট পর পর রান হবে
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Generate Updated Playlist
        run: |
          python << 'PYEOF'
          import requests
          import os
          import re

          # সিক্রেট থেকে URL গুলো নেওয়া
          page_url = os.environ.get('CRICHD_PAGE_URL')
          source_url = os.environ.get('CRICHD_SOURCE_URL')
          source2_url = os.environ.get('CRICHD_SOURCE2_URL')

          # সিক্রেট ভ্যালিডেশন (কোনোটি খালি থাকলে বিল্ড ফেইল হবে)
          if not page_url:
              print("❌ ERROR: Secret 'CRICHD_PAGE' is empty or missing!")
              exit(1)
          if not source_url:
              print("❌ ERROR: Secret 'CRICHD' is empty or missing!")
              exit(1)
          if not source2_url:
              print("❌ ERROR: Secret 'CRICHD_2ND' is empty or missing! Please check GitHub Secrets.")
              exit(1)

          # প্লেলিস্ট ডাউনলোড করার ফাংশন
          def download_playlist(url, name):
              try:
                  resp = requests.get(url, timeout=30)
                  resp.raise_for_status()
                  # \r এবং ট্রেইলিং স্পেস দূর করে লাইনগুলো ক্লিন করা হচ্ছে
                  lines = [line.strip().replace('\r', '') for line in resp.text.split('\n')]
                  print(f"✅ {name} downloaded successfully: {len(lines)} lines")
                  return lines
              except Exception as e:
                  print(f"❌ ERROR: Failed to download {name}: {e}")
                  exit(1) # ফেইল হলে স্ক্রিপ্ট বন্ধ হবে

          page_lines = download_playlist(page_url, "Page template")
          source_lines = download_playlist(source_url, "Source 1 (CRICHD)")
          source2_lines = download_playlist(source2_url, "Source 2 (CRICHD_2ND)")

          # চ্যানেলের নাম গুলো (ম্যাচ করার জন্য)
          target_channels = [
              "Star Sports 1", "Star Sports 1 Hindi", "PTV Sports",
              "Willow HD", "Willow HD 2", "Ten Sports", "A Sports HD",
              "Sky Sports Cricket", "Sky Cinema", "TNT 1", "TNT 2", "TNT 3", "TNT 4",
              "Sky Sport Nz 1", "Sky Sport Nz 2", "Sky Sport Nz 3", "Sky Sport Nz 4",
              "Sky Sport Nz 5", "Sky Sport 6 Nz", "Sky Sport Nz 7", "Sky Sport Nz 8",
              "Sky Sport Nz 9", "Sky Sports Action", "Sky Sports Golf",
              "Sky Sports Premier League", "Sky Sports Football", "Sky Sports Arena",
              "Sky Sports F1", "LaLiGA", "Premier Sports 1", "Premier Sports 2",
              "Super Football", "Super Premier League", "Fox Cricket 501 HD",
              "ESPN 1", "ESPN 2", "Sky Sports Mix", "Sky Sports Tennis",
              "Sony Sports3"
          ]

          # নামের অমিল এড়াতে নরমাল ডিকশনারি তৈরি (যেমন: "PTV Sports" -> "ptvsports")
          def normalize_name(name):
              if not name:
                  return ""
              return "".join(name.split()).lower()

          # টার্গেট চ্যানেলের নরমাল ম্যাপ
          normalized_targets = {normalize_name(ch): ch for ch in target_channels}

          # Helper function to get channel name from EXTINF line
          def get_channel_name(line):
              if line.startswith('#EXTINF:'):
                  parts = line.split(',')
                  if len(parts) > 1:
                      return parts[-1].strip().strip('"\'')
              return None

          # সোর্স ফাইল থেকে অপশন ও স্ট্রিমিং লিঙ্কের লাইনগুলো নিষ্কাশন করার ফাংশন
          def extract_streaming_data(lines, source_name):
              blocks = {}
              matched_list = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if line.startswith('#EXTINF:'):
                      ch_name = get_channel_name(line)
                      if ch_name:
                          norm_name = normalize_name(ch_name)
                          if norm_name in normalized_targets:
                              matched_target_name = normalized_targets[norm_name]
                              stream_lines = []
                              i += 1
                              while i < len(lines):
                                  next_line = lines[i]
                                  if next_line.startswith('#EXTINF:'):
                                      break
                                  if next_line:
                                      stream_lines.append(next_line)
                                  i += 1
                              
                              if matched_target_name in blocks:
                                  blocks[matched_target_name].extend(stream_lines)
                              else:
                                  blocks[matched_target_name] = stream_lines
                              
                              matched_list.append(matched_target_name)
                              continue
                  i += 1
              print(f"📊 {source_name} matched channels: {len(blocks)} ({', '.join(list(set(matched_list))) if matched_list else 'None'})")
              return blocks

          # দুটি সোর্স থেকেই ডাটা সংগ্রহ
          source1_blocks = extract_streaming_data(source_lines, "Source 1 (CRICHD)")
          source2_blocks = extract_streaming_data(source2_lines, "Source 2 (CRICHD_2ND)")

          # দুটি সোর্সের ডাটা একই চ্যানেলের নিচে মার্জ করা
          combined_blocks = {}
          for ch in target_channels:
              combined_lines = []
              if ch in source1_blocks:
                  combined_lines.extend(source1_blocks[ch])
              if ch in source2_blocks:
                  combined_lines.extend(source2_blocks[ch])
              
              if combined_lines:
                  combined_blocks[ch] = combined_lines

          print(f"🔍 Merged blocks prepared for {len(combined_blocks)} channels.")

          # Page template থেকে নতুন প্লেলিস্ট তৈরি করা হচ্ছে
          final_lines = []
          i = 0
          while i < len(page_lines):
              line = page_lines[i]
              if line.startswith('#EXTINF:'):
                  ch_name = get_channel_name(line)
                  if ch_name:
                      norm_name = normalize_name(ch_name)
                      if norm_name in normalized_targets:
                          matched_target_name = normalized_targets[norm_name]
                          if matched_target_name in combined_blocks:
                              # মূল টেমপ্লেটের EXTINF লাইন
                              final_lines.append(line)
                              # ১ম ও ২য় সোর্সের কম্বাইনড লিঙ্ক ও অপশনগুলো পরপর বসবে
                              final_lines.extend(combined_blocks[matched_target_name])
                              
                              # টেমপ্লেটের পুরানো লিঙ্ক স্কিপ
                              i += 1
                              while i < len(page_lines):
                                  next_line = page_lines[i]
                                  if next_line.startswith('#EXTINF:'):
                                      break
                                  i += 1
                              final_lines.append('')
                              final_lines.append('')
                              continue
                  final_lines.append(line)
              elif line.startswith('#EXTM3U'):
                  final_lines.append(line)
              i += 1

          if final_lines and not final_lines[0].startswith('#EXTM3U'):
              final_lines.insert(0, '#EXTM3U')

          content = '\n'.join(final_lines)
          
          # ফাইল সেভ
          with open('CRICHD.m3u', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print(f"✅ Playlist generated successfully!")
          print("📋 Sample Output (First 20 lines):")
          for line in content.split('\n')[:20]:
              print(f"  {line}")
          PYEOF
        env:
          CRICHD_PAGE_URL: ${{ secrets.CRICHD_PAGE }}
          CRICHD_SOURCE_URL: ${{ secrets.CRICHD }}
          CRICHD_SOURCE2_URL: ${{ secrets.CRICHD_2ND }}

      - name: Deploy to Pizza Repository
        run: |
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/buzzinguaecn/Pizza.git pizza-repo
          cp CRICHD.m3u pizza-repo/CRICHD.m3u
          cd pizza-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CRICHD.m3u
          git diff --staged --quiet || git commit -m "🔄 Auto-update CRICHD playlist [skip ci]"
          git push origin main
          echo "✅ Successfully pushed to buzzinguaecn/Pizza/main/CRICHD.m3u"
