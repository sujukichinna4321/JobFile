name: CricHD

on:
  schedule:
    - cron: '*/5 * * * *'  # প্রতি ৫ মিনিট পর পর রান হবে
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Generate Updated Playlist
        run: |
          python << 'PYEOF'
          import requests
          import re
          import os

          # ইউআরএল ক্লিন করার ফাংশন (কোটেশন, স্পেস এবং অদৃশ্য ইউনিকোড ক্যারেক্টার বাদ দেওয়ার জন্য)
          def clean_url(url):
              if not url:
                  return ""
              # স্পেস, ট্যাব, নিউলাইন এবং একক/দ্বৈত কোটেশন মার্ক ট্রিম করা
              cleaned = url.strip(" \t\n\r\"'")
              # অদৃশ্য বা হিডেন ইউনিকোড ক্যারেক্টার ছেঁকে বাদ দেওয়া (শুধুমাত্র প্রিন্টযোগ্য স্ট্যান্ডার্ড ASCII রাখা)
              cleaned = "".join(c for c in cleaned if 32 < ord(c) < 127)
              return cleaned

          # সিক্রেট থেকে URL গুলো নেওয়া এবং ক্লিন করা
          page_url = clean_url(os.environ.get('CRICHD_PAGE_URL'))
          source_url = clean_url(os.environ.get('CRICHD_SOURCE_URL'))
          source2_url = clean_url(os.environ.get('CRICHD_SOURCE2_URL'))

          if not page_url or not source_url or not source2_url:
              print("❌ Secret URLs not found!")
              exit(1)

          # লিংকগুলো সঠিক ফরম্যাটে (http/https) আছে কি না তার ডায়াগনস্টিক চেক
          def check_url_format(url, name):
              if not (url.startswith("http://") or url.startswith("https://")):
                  print(f"\n❌ Error: {name} URL is invalid!")
                  # নিরাপত্তার স্বার্থে ও ভুল সনাক্ত করতে শুধুমাত্র প্রথম ১৫টি অক্ষর প্রিন্ট করা হচ্ছে
                  print(f"👉 Your secret '{name}' value starts with: '{url[:15]}...' (Total Length: {len(url)})")
                  print("👉 Please make sure you have pasted the correct URL or did not write any other text in GitHub Secrets.")
                  exit(1)

          check_url_format(page_url, "CRICHD_PAGE")
          check_url_format(source_url, "CRICHD")
          check_url_format(source2_url, "CRICHD_2ND")

          print(f"📥 Page playlist: {page_url}")
          print(f"📥 Source playlist: {source_url}")
          print(f"📥 Source 2 playlist: {source2_url}")

          # CRICHD_PAGE ডাউনলোড
          try:
              page_resp = requests.get(page_url, timeout=30)
              page_resp.raise_for_status()
              page_lines = page_resp.text.strip().split('\n')
              print(f"✅ Page playlist downloaded: {len(page_lines)} lines")
          except Exception as e:
              print(f"❌ Failed to download page playlist: {e}")
              exit(1)

          # CRICHD সোর্স ডাউনলোড
          try:
              source_resp = requests.get(source_url, timeout=30)
              source_resp.raise_for_status()
              source_lines = source_resp.text.strip().split('\n')
              print(f"✅ Source playlist downloaded: {len(source_lines)} lines")
          except Exception as e:
              print(f"❌ Failed to download source playlist: {e}")
              exit(1)

          # CRICHD_2ND সোর্স ডাউনলোড
          try:
              source2_resp = requests.get(source2_url, timeout=30)
              source2_resp.raise_for_status()
              source2_lines = source2_resp.text.strip().split('\n')
              print(f"✅ Source 2 playlist downloaded: {len(source2_lines)} lines")
          except Exception as e:
              print(f"❌ Failed to download source 2 playlist: {e}")
              exit(1)

          # চ্যানেলের নাম গুলো (ম্যাচ করার জন্য)
          target_channels = [
              "Star Sports 1", "Star Sports 1 Hindi", "PTV Sports",
              "Willow HD", "Willow HD 2", "Ten Sports", "A Sports HD",
              "Sky Sports Cricket", "Sky Cinema", "TNT 1", "TNT 2", "TNT 3", "TNT 4",
              "Sky Sport Nz 1", "Sky Sport Nz 2", "Sky Sport Nz 3", "Sky Sport Nz 4",
              "Sky Sport Nz 5", "Sky Sport 6 Nz", "Sky Sport Nz 7", "Sky Sport Nz 8",
              "Sky Sport Nz 9", "Sky Sports Action", "Sky Sports Golf",
              "Sky Sports Premier League", "Sky Sports Football", "Sky Sports Arena",
              "Sky Sports F1", "LaLiGA", "Premier Sports 1", "Premier Sports 2",
              "Super Football", "Super Premier League", "Fox Cricket 501 HD",
              "ESPN 1", "ESPN 2", "Sky Sports Mix", "Sky Sports Tennis",
              "Sony Sports3"
          ]

          # Helper function to get channel name from EXTINF line
          def get_channel_name(line):
              if line.startswith('#EXTINF:'):
                  # শেষ কমার পরের অংশ চ্যানেলের নাম
                  parts = line.split(',')
                  if len(parts) > 1:
                      return parts[-1].strip()
              return None

          # সোর্স ফাইল থেকে শুধুমাত্র অপশন ও স্ট্রিমিং লিঙ্কগুলো নিষ্কাশন করার হেল্পার ফাংশন
          def get_source_blocks(lines):
              blocks = {}
              i = 0
              while i < len(lines):
                  line = lines[i].strip()
                  if line.startswith('#EXTINF:'):
                      ch_name = get_channel_name(line)
                      if ch_name and ch_name in target_channels:
                          stream_lines = []
                          i += 1
                          while i < len(lines):
                              next_line = lines[i].strip()
                              if next_line.startswith('#EXTINF:'):
                                  break
                              if next_line:  # খালি লাইন স্কিপ
                                  stream_lines.append(next_line)
                              i += 1
                          if stream_lines:
                              blocks[ch_name] = '\n'.join(stream_lines)
                          continue
                  i += 1
              return blocks

          # দুটি সোর্স থেকেই পৃথকভাবে ডাটা নিষ্কাশন
          source1_blocks = get_source_blocks(source_lines)
          source2_blocks = get_source_blocks(source2_lines)

          # দুটি সোর্সের ডাটা একত্র করে আপনার অরিজিনাল ফরম্যাটে রূপান্তর
          source_blocks = {}
          for ch in target_channels:
              combined_lines = []
              if ch in source1_blocks:
                  combined_lines.append(source1_blocks[ch])
              if ch in source2_blocks:
                  combined_lines.append(source2_blocks[ch])
              
              if combined_lines:
                  # DUMMY_LINE যোগ করা হয়েছে যাতে নিচের .split('\n', 1)[1] লজিকটি কোনো পরিবর্তন ছাড়াই কাজ করে
                  source_blocks[ch] = "DUMMY_LINE\n" + "\n".join(combined_lines)

          print(f"🔍 Found {len(source_blocks)} matching channels in combined sources")

          # Page playlist থেকে EXTINF লাইন গুলো প্রসেস করে ফাইনাল প্লেলিস্ট তৈরি
          final_lines = []
          i = 0
          while i < len(page_lines):
              line = page_lines[i].strip()
              if line.startswith('#EXTINF:'):
                  ch_name = get_channel_name(line)
                  if ch_name and ch_name in source_blocks:
                      # Page এর EXTINF লাইন + সোর্স থেকে স্ট্রিমিং ব্লক
                      final_lines.append(line)
                      final_lines.append(source_blocks[ch_name].split('\n', 1)[1] if '\n' in source_blocks[ch_name] else '')
                      # #EXTINF এর পরের লাইনগুলো স্কিপ (যেগুলো সোর্স থেকে বসানো হয়েছে সেগুলো বাদে)
                      i += 1
                      while i < len(page_lines):
                          next_line = page_lines[i].strip()
                          if next_line.startswith('#EXTINF:'):
                              break
                          i += 1
                      # গ্যাপ (২ লাইন)
                      final_lines.append('')
                      final_lines.append('')
                      continue
                  else:
                      final_lines.append(line)
              elif line.startswith('#EXTM3U'):
                  final_lines.append(line)
              i += 1

          # যদি #EXTM3U না থাকে, প্রথমে বসানো
          if final_lines and not final_lines[0].startswith('#EXTM3U'):
              final_lines.insert(0, '#EXTM3U')

          content = '\n'.join(final_lines)
          
          # আউটপুট ফাইল সংরক্ষণ
          with open('CRICHD.m3u', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print(f"✅ Generated playlist: {len(content)} characters, {content.count('#EXTINF:')} entries")
          print("📋 First 15 lines of output:")
          for line in content.split('\n')[:15]:
              print(f"  {line}")
          PYEOF
        env:
          CRICHD_PAGE_URL: ${{ secrets.CRICHD_PAGE }}
          CRICHD_SOURCE_URL: ${{ secrets.CRICHD }}
          CRICHD_SOURCE2_URL: ${{ secrets.CRICHD_2ND }}

      - name: Deploy to Pizza Repository
        run: |
          # Pizza রিপোজিটরি ক্লোন
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/buzzinguaecn/Pizza.git pizza-repo
          
          # জেনারেট করা ফাইল কপি
          cp CRICHD.m3u pizza-repo/CRICHD.m3u
          
          cd pizza-repo
          
          # Git কনফিগ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # কমিট এবং পুশ
          git add CRICHD.m3u
          git diff --staged --quiet || git commit -m "🔄 Auto-update CRICHD playlist [skip ci]"
          git push origin main
          
          echo "✅ Successfully pushed to buzzinguaecn/Pizza/main/CRICHD.m3u"
